<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>南京地铁施工负责人考试·题库练习</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:600}
.header .info{font-size:13px;opacity:.85}
.tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;flex-wrap:wrap}
.tab{padding:12px 22px;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.tab:hover{color:#2563eb;background:#f8faff}
.tab.active{color:#2563eb;border-color:#2563eb;font-weight:600}
.container{max-width:820px;margin:0 auto;padding:24px 20px}
.home-card{background:#fff;border-radius:10px;padding:32px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.home-card h2{font-size:20px;margin-bottom:8px}
.home-card .desc{color:#666;font-size:14px;line-height:1.7;margin-bottom:20px}
.stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat{flex:1;min-width:120px;background:#f8faff;padding:16px;border-radius:8px;text-align:center}
.stat .num{font-size:26px;font-weight:700;color:#2563eb}
.stat .label{font-size:12px;color:#888;margin-top:4px}
.actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{padding:10px 28px;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:500;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#059669;color:#fff}
.btn-success:hover{background:#047857}
.btn-outline{background:#fff;color:#333;border:1px solid #d0d0d0}
.btn-outline:hover{background:#f5f5f5}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:6px 14px;font-size:13px}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.quiz-header .progress{font-size:14px;color:#555}
.quiz-header .mode-badge{background:#e8f0fe;color:#2563eb;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.question-card{background:#fff;border-radius:10px;padding:28px 30px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.question-type{display:inline-block;background:#f0f2f5;color:#666;font-size:11px;padding:2px 8px;border-radius:3px;margin-bottom:12px}
.question-stem{font-size:16px;line-height:1.8;margin-bottom:20px;word-break:break-word}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border:1px solid #e0e0e0;border-radius:6px;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.6}
.option:hover{border-color:#93c5fd;background:#f8faff}
.option.selected{border-color:#2563eb;background:#e8f0fe}
.option.correct{border-color:#059669;background:#ecfdf5}
.option.wrong{border-color:#dc2626;background:#fef2f2}
.option .label{font-weight:600;min-width:20px;color:#555;flex-shrink:0}
.option.disabled{pointer-events:none}
.feedback{margin-top:16px;padding:14px 18px;border-radius:6px;font-size:14px;line-height:1.6}
.feedback.correct{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.feedback.wrong{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
.feedback .ans{font-weight:600}
.quiz-footer{display:flex;justify-content:space-between;margin-top:18px;flex-wrap:wrap;gap:10px}
.exam-nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
.exam-nav button{padding:6px 14px;border:1px solid #d0d0d0;border-radius:4px;background:#fff;cursor:pointer;font-size:13px}
.exam-nav button:hover{background:#f5f5f5}
.exam-nav button.current{background:#2563eb;color:#fff;border-color:#2563eb}
.exam-nav button.answered{background:#dbeafe;border-color:#93c5fd}
.results{background:#fff;border-radius:10px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center}
.results .score{font-size:48px;font-weight:700;color:#2563eb;margin:10px 0}
.results .score-detail{font-size:15px;color:#666;margin-bottom:20px}
.results .status{padding:6px 20px;border-radius:20px;display:inline-block;font-size:14px;margin-bottom:20px}
.results .status.pass{background:#ecfdf5;color:#065f46}
.results .status.fail{background:#fef2f2;color:#991b1b}
.wrong-review{margin-top:24px;text-align:left}
.wrong-review h4{font-size:16px;margin-bottom:12px;color:#dc2626}
.wrong-item{background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:14px 18px;margin-bottom:10px;text-align:left}
.wrong-item .q{font-size:14px;margin-bottom:6px;line-height:1.6}
.wrong-item .detail{font-size:13px;color:#666}
.wrong-item .detail .right{color:#059669;font-weight:600}
.edit-toolbar{margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.question-list{display:flex;flex-direction:column;gap:8px}
.q-item{background:#fff;border-radius:6px;padding:12px 16px;border:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.q-item:hover{background:#f8faff}
.q-item .q-preview{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.q-item .q-type{font-size:11px;padding:1px 6px;border-radius:3px;background:#f0f2f5;color:#666;white-space:nowrap;flex-shrink:0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:10px;padding:28px;width:92%;max-width:640px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:#555;margin-bottom:4px;font-weight:500}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 12px;border:1px solid #d0d0d0;border-radius:4px;font-size:14px;font-family:inherit}
.form-group textarea{min-height:60px;resize:vertical}
.form-group .opt-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.form-group .opt-row .opt-label{font-weight:600;min-width:20px;color:#555;flex-shrink:0}
.form-group .opt-row input{flex:1}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.empty-state{text-align:center;padding:40px 20px;color:#999;font-size:14px}
.exam-result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.questions-per-page{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px;text-align:right}
.questions-per-page select{padding:4px 8px;border:1px solid #d0d0d0;border-radius:4px;font-size:13px}
.wrong-card{background:#fff;border-radius:10px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.wrong-card h3{font-size:17px;margin-bottom:8px}
.wrong-card .sub{color:#888;font-size:13px;margin-bottom:16px}
.wrong-filter{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.wrong-filter .tag{padding:6px 16px;border:1px solid #d0d0d0;border-radius:20px;background:#fff;cursor:pointer;font-size:13px;transition:all .15s}
.wrong-filter .tag:hover{background:#f5f5f5}
.wrong-filter .tag.active{background:#2563eb;color:#fff;border-color:#2563eb}
.w-item{background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.w-item:hover{background:#fee2e2}
.w-item .w-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
.w-item .w-type{font-size:11px;padding:1px 6px;border-radius:3px;background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
.w-item .w-count{font-size:12px;color:#dc2626;font-weight:600}
.w-item .w-stem{font-size:14px;line-height:1.6}
.w-item .w-detail{font-size:12px;color:#888;margin-top:4px}
@media(max-width:600px){.header{padding:14px 16px}.container{padding:14px 12px}.question-card{padding:18px 16px}.modal{padding:20px;width:96%}}
</style>
</head>

<script>

var DEFAULT_QUESTIONS = [{"id": 1, "type": "单选题", "stem": "《安全生产法》第三条规定：安全生产工作应当以人为本，坚持人民至上、生命至上，把保护人民生命安全摆在首位，树牢安全发展理念，坚持（）的方针，从源头上防范化解重大安全风险。", "options": ["安全第一、预防为主、综合治理", "预防为主、防消结合、综合治理", "关口前移、集中整治、统筹规划", "综合治理、防消结合、统筹规划"], "answer": "A", "explanation": ""}, {"id": 2, "type": "单选题", "stem": "《安全生产法》第三条规定：安全生产工作实行管行业必须管安全、管业务必须管安全、管生产经营必须管安全，强化和落实生产经营单位主体责任与政府监管责任，建立生产经营单位负责、（）、政府监管、行业自律和社会监督的机制。", "options": ["群众参与", "职工参与", "工会参与", "全员参与"], "answer": "B", "explanation": ""}, {"id": 3, "type": "单选题", "stem": "《安全生产法》第五条规定：生产经营单位的主要负责人是本单位安全生产第一责任人，对本单位的安全生产工作全面负责。其他负责人对（）负责。", "options": ["本单位的安全生产工作", "职责范围内的安全生产工作", "职责范围内的生产技术工作", "职责范围内的日常管理工作"], "answer": "B", "explanation": ""}, {"id": 4, "type": "单选题", "stem": "《安全生产法》第六条规定：生产经营单位的从业人员有依法获得安全生产保障的权利，并应当依法履行（）方面的义务。", "options": ["安全生产", "技术指导", "依法纳税", "培训教育"], "answer": "A", "explanation": ""}, {"id": 5, "type": "单选题", "stem": "《安全生产法》第十一条规定：生产经营单位必须执行依法制定的保障安全生产的（）。", "options": ["国家标准或者行业标准", "地方标准或者行业标准", "行业标准或者企业标准", "地方标准和企业标准"], "answer": "A", "explanation": ""}, {"id": 6, "type": "单选题", "stem": "《安全生产法》第十六条规定：国家实行生产安全事故责任追究制度，依照本法和有关法律、法规的规定，追究生产安全事故（）的法律责任。", "options": ["监管单位", "责任单位", "责任人员", "责任单位和责任人员"], "answer": "D", "explanation": ""}, {"id": 7, "type": "单选题", "stem": "《安全生产法》第十九条规定：国家对在（）等方面取得显著成绩的单位和个人，给予奖励。", "options": ["增进日常生产效率、提升经济效益、开展公益性培训教育。", "改善安全生产条件、防止生产安全事故、参加抢险救护。", "科技和管理创新、改善生产和生活条件、降本增效。", "科学技术突破、技术重大改造、降本增效。"], "answer": "B", "explanation": ""}, {"id": 8, "type": "单选题", "stem": "《安全生产法》第二十条规定：生产经营单位应当具备本法和有关法律、行政法规和国家标准或者行业标准规定的安全生产条件；不具备安全生产条件的，（）。", "options": ["同时改进安全生产条件、同时从事生产经营", "不得从事生产经营活动", "可以从事生产经营活动", "先从事生产经营、后改进安全生产条件"], "answer": "B", "explanation": ""}, {"id": 9, "type": "单选题", "stem": "《安全生产法》第二十二条规定：生产经营单位的全员安全生产责任制应当明确（）的责任人员、责任范围和考核标准等内容。", "options": ["主要负责人", "其他负责人", "安全管理人", "各岗位"], "answer": "D", "explanation": ""}, {"id": 10, "type": "单选题", "stem": "《安全生产法》第二十二条规定：生产经营单位应当建立相应的机制，加强对（）安全生产责任制落实情况的监督考核，保证（）安全生产责任制的落实。", "options": ["主要负责人", "其他负责人", "安全管理人", "全员"], "answer": "D", "explanation": ""}, {"id": 11, "type": "单选题", "stem": "依据《安全生产法》第二十五条规定，以下不属于安全生产管理人员履行的职责是（）。", "options": ["组织或者参与本单位安全生产教育和培训，如实记录安全生产教育和培训情况。", "检查本单位的安全生产状况，及时排查生产安全事故隐患，提出改进安全生产管理的建议。", "建立健全并落实本单位全员安全生产责任制，加强安全生产标准化建设。", "制止和纠正违章指挥、强令冒险作业、违反操作规程的行为。"], "answer": "C", "explanation": "主要负责人的职责"}, {"id": 12, "type": "单选题", "stem": "依据《安全生产法》第二十八条规定，以下说法错误的是（）。", "options": ["生产经营单位应当对从业人员进行安全生产教育和培训，保证从业人员具备必要的安全生产知识。", "从业人员应当熟悉有关的安全生产规章制度和安全操作规程，掌握本岗位的安全操作技能。", "从业人员应当了解事故应急处理措施，知悉自身在安全生产方面的权利和义务。", "未经安全生产教育和培训合格的从业人员，可以在有人监督下上岗作业。"], "answer": "D", "explanation": "未经安全生产教育和培训合格的从业人员，不得上岗作业。"}, {"id": 13, "type": "单选题", "stem": "依据《安全生产法》第二十八条和第五十二条规定，以下说法错误的是（）。", "options": ["生产经营单位使用被派遣劳动者的，应当将被派遣劳动者纳入本单位从业人员统一管理。", "生产经营单位应当对被派遣劳动者进行岗位安全操作规程和安全操作技能的教育和培训。", "劳务派遣单位应当对被派遣劳动者进行必要的安全生产教育和培训。", "生产经营单位可以与从业人员订立协议，免除或者减轻其对从业人员因生产安全事故伤亡依法应承担的责任。"], "answer": "D", "explanation": "第五十二条规定：生产经营单位不得以任何形式与从业人员订立协议，免除或者减轻其对从业人员因生产安全事故伤亡依法应承担的责任。"}, {"id": 14, "type": "单选题", "stem": "2025年7月23日10时20分许，东北大学6名学生在中国黄金集团内蒙古矿业有限公司乌努格吐山铜钼矿选矿厂参观学习浮选工艺过程中，因格栅板脱落坠入浮选槽。经全力施救，6人被救出后，医护人员确认已溺亡。另有1名老师受伤。结合《安全生产法》第二十八条和第三十六条规定，以下说法错误的是（）。", "options": ["生产经营单位接收中等职业学校、高等学校学生实习的，应当对实习学生进行相应的安全生产教育和培训。", "生产经营单位应当提供必要的劳动防护用品。", "生产经营单位必须对安全设备进行经常性维护、保养，并不定期检测，保证外观完好。维护、保养、检测应当作好记录。", "学校应当协助生产经营单位对实习学生进行安全生产教育和培训。"], "answer": "C", "explanation": "生产经营单位必须对安全设备进行经常性维护、保养，并定期检测，保证正常运转。维护、保养、检测应当作好记录，并由有关人员签字。"}, {"id": 15, "type": "单选题", "stem": "《安全生产法》第二十八条规定：生产经营单位应当建立安全生产教育和培训档案，如实记录安全生产教育和培训的时间、内容、参加人员以及（）等情况。", "options": ["培训效果", "考核结果", "培训状况", "授课讲师"], "answer": "B", "explanation": ""}, {"id": 16, "type": "单选题", "stem": "《安全生产法》第二十八条规定：生产经营单位应当建立（），如实记录安全生产教育和培训的时间、内容、参加人员以及考核结果等情况。", "options": ["安全生产教育和培训档案", "培训记录台账", "安全生产记录档案", "员工个人学习档案"], "answer": "A", "explanation": ""}, {"id": 17, "type": "单选题", "stem": "《安全生产法》第二十九条规定：生产经营单位采用新工艺、新技术、新材料或者使用新设备，必须了解、掌握其安全技术特性，采取有效的安全防护措施，并对从业人员进行（）。", "options": ["安全技术与安全防护培训", "安全生产和职业病预防培训", "专门的安全生产教育和培训", "临时的安全生产教育和培训"], "answer": "C", "explanation": ""}, {"id": 18, "type": "单选题", "stem": "《安全生产法》第三十条规定：生产经营单位的特种作业人员必须按照国家有关规定经专门的安全作业培训，取得（），方可上岗作业。", "options": ["结业证书", "相应资格", "肄业证书", "培训证明"], "answer": "B", "explanation": ""}, {"id": 19, "type": "单选题", "stem": "《安全生产法》第三十五条规定：生产经营单位应当在有（）因素的生产经营场所和有关设施、设备上，设置明显的安全警示标志。", "options": ["极其重大危险", "特别重大危险", "重大危险", "较大危险"], "answer": "D", "explanation": ""}, {"id": 20, "type": "单选题", "stem": "《安全生产法》第三十五条规定：生产经营单位应当在有较大危险因素的生产经营场所和有关设施、设备上，设置（）。", "options": ["安全标语", "安全告示", "安全说明", "明显的安全警示标志"], "answer": "D", "explanation": ""}, {"id": 21, "type": "单选题", "stem": "《安全生产法》第三十六条规定：安全设备的设计、制造、安装、使用、检测、维修、改造和报废，应当符合（）。", "options": ["国家标准或者行业标准", "地方标准或者行业标准", "行业标准或者企业标准", "地方标准和企业标准"], "answer": "A", "explanation": ""}, {"id": 22, "type": "单选题", "stem": "依据《安全生产法》第三十六条规定，以下说法正确的是（）。", "options": ["生产经营单位必须对安全设备进行不定期维护。", "生产经营单位必须对安全设备进行不定期保养。", "生产经营单位必须对安全设备进行定期检测，保证正常运转。", "维护、保养应当作好记录，无须签字。"], "answer": "C", "explanation": "《安全生产法》第三十六条规定：生产经营单位必须对安全设备进行经常性维护、保养，并定期检测，保证正常运转。维护、保养、检测应当作好记录，并由有关人员签字。"}, {"id": 23, "type": "单选题", "stem": "《安全生产法》第三十六条规定：生产经营单位不得关闭、破坏直接关系生产安全的（）、防护、救生设备、设施，或者篡改、隐瞒、销毁其相关数据、信息。", "options": ["记录仪、电话", "监控、报警", "显示器、信号灯", "阀门、喷淋"], "answer": "B", "explanation": ""}, {"id": 24, "type": "单选题", "stem": "《江苏省安全生产条例》第三十一条规定，生产经营单位应当将接受其作业指令的被派遣劳动者、灵活用工人员纳入本单位对从业人员安全生产的（），履行安全生产保障责任，不得将安全生产保障责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。鼓励生产经营单位为灵活用工人员提供购置相关保险等保障。", "options": ["分开管理", "统一管理", "分层管理", "逐级管理"], "answer": "B", "explanation": "第三十一条生产经营单位应当将接受其作业指令的被派遣劳动者、灵活用工人员纳入本单位对从业人员安全生产的统一管理，履行安全生产保障责任，不得将安全生产保障责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。鼓励生产经营单位为灵活用工人员提供购置相关保险等保障。劳务派遣单位应当对被派遣劳动者进行必要的安全生产教育和培训。"}, {"id": 25, "type": "判断题", "stem": "生产经营单位委托其他单位进行危险作业的，应当在作业前口头明确并落实相关安全规定，对受托方安全生产工作统一协调、管理，并加强监督检查。", "options": ["正确", "错误"], "answer": "B", "explanation": "《江苏省安全生产条例》第二十九条规定，生产经营单位委托其他单位进行危险作业的，应当在作业前与受托方签订安全生产管理协议，明确并落实前款规定，对受托方安全生产工作统一协调、管理，并加强监督检查。"}, {"id": 26, "type": "判断题", "stem": "生产经营单位可以将危险作业委托给不具备安全生产条件或者相应资质的单位或者个人，但需要做好监护。", "options": ["正确", "错误"], "answer": "B", "explanation": "《江苏省安全生产条例》第二十九条规定，生产经营单位不得将危险作业委托给不具备安全生产条件或者相应资质的单位或者个人。"}, {"id": 27, "type": "判断题", "stem": "生产经营单位应当将接受其作业指令的被派遣劳动者、灵活用工人员纳入本单位对从业人员安全生产的分开管理，履行安全生产保障责任，可以将安全生产保障责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。", "options": ["正确", "错误"], "answer": "B", "explanation": "第三十一条生产经营单位应当将接受其作业指令的被派遣劳动者、灵活用工人员纳入本单位对从业人员安全生产的统一管理，履行安全生产保障责任，不得将安全生产保障责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。鼓励生产经营单位为灵活用工人员提供购置相关保险等保障。劳务派遣单位应当对被派遣劳动者进行必要的安全生产教育和培训。"}, {"id": 28, "type": "判断题", "stem": "劳务派遣单位无须对被派遣劳动者进行必要的安全生产教育和培训。", "options": ["正确", "错误"], "answer": "B", "explanation": "第三十一条生产经营单位应当将接受其作业指令的被派遣劳动者、灵活用工人员纳入本单位对从业人员安全生产的统一管理，履行安全生产保障责任，不得将安全生产保障责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。鼓励生产经营单位为灵活用工人员提供购置相关保险等保障。劳务派遣单位应当对被派遣劳动者进行必要的安全生产教育和培训。"}, {"id": 29, "type": "单选题", "stem": "《江苏省安全生产条例》第三十二条规定，生产经营单位应当为从业人员提供（）的劳动防护用品，并教育、督促从业人员正确佩戴、使用。", "options": ["价格实惠", "安全有保障", "符合国家标准或者行业标准", "符合行业标准或者企业标准"], "answer": "C", "explanation": ""}, {"id": 30, "type": "判断题", "stem": "生产经营单位允许以发放货币或者其他物品替代提供劳动防护用品。生产经营单位应当依法加强对女职工、未成年工等的劳动保护。", "options": ["正确", "错误"], "answer": "B", "explanation": "第三十二条生产经营单位应当为从业人员提供符合国家标准或者行业标准的劳动防护用品，并教育、督促从业人员正确佩戴、使用。生产经营单位不得以发放货币或者其他物品替代提供劳动防护用品。生产经营单位应当依法加强对女职工、未成年工等的劳动保护。"}, {"id": 31, "type": "单选题", "stem": "《江苏省安全生产条例》第三十三条规定，生产经营单位应当关注从业人员的身体、心理状况和行为习惯，加强对从业人员的健康检查、心理疏导、精神慰藉，防范从业人员（）导致生产安全事故发生。", "options": ["心理因素", "身体因素", "异常行为", "正常行为"], "answer": "C", "explanation": ""}, {"id": 32, "type": "单选题", "stem": "依据《南京市安全生产条例》第十八条规定，生产经营单位应当在生产区域显著位置设置安全风险公告栏，公告栏内容不包括（）。", "options": ["安全生产主要风险点、风险类别、风险等级", "可能导致的事故类型和可能导致的事故后果、管控措施、管控责任人", "应急措施", "品牌创建活动方案"], "answer": "D", "explanation": "《南京市安全生产条例》第十八条规定，生产经营单位应当在生产区域显著位置设置安全风险公告栏，公布安全生产主要风险点、风险类别、风险等级、可能导致的事故类型和后果、管控措施、管控责任人和应急措施。公告内容应当及时更新并建立档案。"}, {"id": 33, "type": "判断题", "stem": "生产经营单位应当在生产区域显著位置设置安全风险公告栏，公告内容应当定期更新并建立档案。", "options": ["正确", "错误"], "answer": "B", "explanation": "《南京市安全生产条例》第十八条规定，生产经营单位应当在生产区域显著位置设置安全风险公告栏，公布安全生产主要风险点、风险类别、风险等级、可能导致的事故类型和后果、管控措施、管控责任人和应急措施。公告内容应当及时更新并建立档案。"}, {"id": 34, "type": "单选题", "stem": "依据《南京市安全生产条例》第十九条规定，生产经营单位对重大危险源管控，以下说法错误的是（）。", "options": ["应当对重大危险源登记建档", "进行监控和定期检测、评估", "制定应急救援预案", "从业人员和相关人员自行学习在紧急情况下应当采取的应急措施"], "answer": "D", "explanation": "《南京市安全生产条例》第十九条规定，生产经营单位应当对重大危险源登记建档，进行监控和定期检测、评估，制定应急救援预案，告知从业人员和相关人员在紧急情况下应当采取的应急措施。"}, {"id": 35, "type": "单选题", "stem": "《南京市安全生产条例》第二十条规定，生产经营单位应当建立健全并落实生产安全事故隐患排查治理制度，定期组织排查本单位的事故隐患，通过相关信息系统如实记录事故隐患排查治理情况，并向（）通报。", "options": ["生产人员", "从业人员", "委外人员", "管理人员"], "answer": "B", "explanation": ""}, {"id": 36, "type": "单选题", "stem": "依据《南京市安全生产条例》第三十七条规定，生产经营单位使用被派遣劳动者、灵活用工人员的，以下说法错误的是（）。", "options": ["应当履行安全生产责任。", "将被派遣劳动者、灵活用工人员纳入本单位从业人员进行统一管理、教育和培训。", "可以将由其承担的安全生产管理责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。", "被派遣劳动者、灵活用工人员依法享有从业人员的权利，并应当依法履行从业人员的义务。"], "answer": "C", "explanation": "《南京市安全生产条例》第三十七条规定，生产经营单位使用被派遣劳动者、灵活用工人员的，应当履行安全生产责任，将被派遣劳动者、灵活用工人员纳入本单位从业人员进行统一管理、教育和培训，不得将由其承担的安全生产管理责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。被派遣劳动者、灵活用工人员依法享有从业人员的权利，并应当依法履行从业人员的义务。"}, {"id": 37, "type": "判断题", "stem": "被派遣劳动者、灵活用工人员依法享有从业人员的权利，并应当依法履行从业人员的义务。", "options": ["正确", "错误"], "answer": "A", "explanation": "《南京市安全生产条例》第三十七条规定，被派遣劳动者、灵活用工人员依法享有从业人员的权利，并应当依法履行从业人员的义务。"}, {"id": 38, "type": "判断题", "stem": "被派遣劳动者、灵活用工人员不计入生产经营单位从业人员的总数。", "options": ["正确", "错误"], "answer": "B", "explanation": "《南京市安全生产条例》第三十七条规定，被派遣劳动者、灵活用工人员应当计入生产经营单位从业人员的总数。"}, {"id": 39, "type": "单选题", "stem": "依据《南京市安全生产条例》第五十二条规定，遇到险情时，以下说法错误的是（）。", "options": ["现场有关人员应当立即向本单位负责人报告。", "生产经营单位应当及时启动应急救援预案，实施救援工作，抢救人员和财产。", "生产经营单位现场带班人员、班组长和调度人员无权在第一时间下达停止作业、撤离人员的命令。", "发现直接危及人身安全紧急情况的，采取应急措施，停止作业，撤出人员。"], "answer": "C", "explanation": "《南京市安全生产条例》第五十二条规定，遇到险情时，现场有关人员应当立即向本单位负责人报告。生产经营单位应当及时启动应急救援预案，实施救援工作，抢救人员和财产。生产经营单位现场带班人员、班组长和调度人员有权在第一时间下达停止作业、撤离人员的命令。第二十九条生产经营单位进行爆破、吊装、高处作业、有限（受限）空间作业、临近油气输送管道作业、临近高压输电线路作业、建筑物和构筑物拆除、大型检修以及涉及危险物品的场所动火和临时用电等危险作业，应当执行有关危险作业管理制度，并遵守下列规定：（一）对作业安全风险进行评估，确认现场作业条件符合安全作业要求；（二）根据安全风险明确安全防范措施和现场应急处置措施；（三）确认作业人员的上岗资格以及劳动防护用品的配备、使用符合安全作业要求；（四）配备相应的安全设施和应急救援器材，设置作业现场的安全区域，确定专人现场统一指挥和监督；（五）在危险作业前向作业人员告知危险因素、作业安全要求和现场应急处置措施，并经双方现场签字确认；（六）发现直接危及人身安全的紧急情况时，按照现场应急处置措施停止作业、撤出人员。"}, {"id": 40, "type": "单选题", "stem": "《南京市安全生产条例》第五十三条规定，发生生产安全事故造成人员伤害需要抢救的，生产经营单位应当（）。", "options": ["等候救护车并将人送往医院救治。", "等候救护车并将人送往医院救治，并垫付医疗费用。", "及时将受伤人员送至医疗机构，并垫付医疗费用。", "及时将受伤人员送至医疗机构，由伤者家属先期垫付。"], "answer": "C", "explanation": "《南京市安全生产条例》第五十三条规定，发生生产安全事故造成人员伤害需要抢救的，生产经营单位应当（）。因特殊情况不能及时垫付的，医疗机构不得拒绝救护。"}, {"id": 41, "type": "单选题", "stem": "《中华人民共和国消防法》第二十一条规定，禁止在具有火灾、爆炸危险的场所吸烟、使用明火。因施工等特殊情况需要使用明火作业的，应当按照规定事先办理审批手续，采取相应的消防安全措施；作业人员应当遵守消防安全规定。进行电焊、气焊等具有火灾危险作业的人员和自动消防系统的操作人员，必须（），并遵守消防安全操作规程。", "options": ["培训合格", "持证上岗", "培训上岗", "作业前先培训"], "answer": "B", "explanation": ""}, {"id": 42, "type": "单选题", "stem": "《中华人民共和国消防法》第二十一条规定，禁止在具有火灾、爆炸危险的场所吸烟、使用明火。因施工等特殊情况需要使用明火作业的，应当按照规定事先（），采取相应的消防安全措施；作业人员应当遵守消防安全规定。进行电焊、气焊等具有火灾危险作业的人员和自动消防系统的操作人员，必须持证上岗，并遵守消防安全操作规程。", "options": ["征得分管上级领导同意", "进行试验", "办理审批手续", "征得消防管理机构同意"], "answer": "C", "explanation": ""}, {"id": 43, "type": "单选题", "stem": "依据《江苏省消防条例》第二十条，个人应当履行的消防安全义务，以下说法错误的是（）。", "options": ["遵守消防法律、法规、规章规定，安全用火、用电、用油、用气。", "学习消防安全知识，掌握相应的火灾预防、报警、灭火和逃生自救方法。", "自愿接受消防安全教育，参加消防演练。", "鼓励住宅户内配备火灾报警、灭火器、避难逃生等消防产品。"], "answer": "C", "explanation": "第二十条个人应当履行下列消防安全义务：（一）遵守消防法律、法规、规章规定；（二）安全用火、用电、用油、用气；（三）学习消防安全知识，掌握相应的火灾预防、报警、灭火和逃生自救方法；（四）按照规定接受消防安全教育，参加消防演练。监护人应当对被监护人进行消防安全教育，采取必要的消防安全措施。鼓励住宅户内配备火灾报警、灭火器、避难逃生等消防产品。"}, {"id": 44, "type": "单选题", "stem": "《江苏省消防条例》第四十二条规定，（）在楼梯间、楼道等疏散通道、安全出口、消防车通道及其两侧影响通行的区域堆放物品、停放车辆。", "options": ["短期", "长期", "可以", "禁止"], "answer": "D", "explanation": ""}, {"id": 45, "type": "判断题", "stem": "建筑物外立面装修、装饰、设置广告，不宜妨害防火、逃生和灭火救援。", "options": ["正确", "错误"], "answer": "B", "explanation": "《江苏省消防条例》第四十五条规定，建筑物外立面装修、装饰、设置广告，应当符合消防安全规定，不得妨害防火、逃生和灭火救援。"}, {"id": 46, "type": "单选题", "stem": "依据《江苏省消防条例》第四十七条规定，以下做法正确的是（）。", "options": ["动火气焊作业时，可以边抽烟、边焊接。", "仓库拆货物包装时，可以使用打火机烧断绳带。", "动火作业时，施工负责人亲自或安排专人在旁边进行了监护。", "轨行区纸质垃圾较多，施工人员就地进行了焚烧。"], "answer": "C", "explanation": "《江苏省消防条例》第四十七条规定，禁止在生产、经营、储存易燃易爆危险品的场所和存放可燃、易燃物资的仓库、露天堆场等具有火灾、爆炸危险的场所吸烟、使用明火。"}, {"id": 47, "type": "单选题", "stem": "《江苏省消防条例》第四十七条规定，具有火灾、爆炸危险的场所，建设工程施工现场，正在生产、营业、使用的人员密集场所，因施工等原因需要明火作业的，（）。", "options": ["应当按照单位的用火管理制度事先办理手续，落实现场消防安全措施。", "应当按照单位的用火管理制度事先征得分管领导同意，落实现场专人安全防护措施。", "应当按照单位的用火管理制度事先征得消防救援机构同意，落实现场安全管理措施。", "应当按照单位的用火管理制度谨慎施工，落实现场消防安全措施。"], "answer": "A", "explanation": ""}, {"id": 48, "type": "单选题", "stem": "贾某担任南京一公司的电焊组组长期间，因招聘不具备焊工资质的工人舒某从事压力焊特种作业，且未向上级部门或项目组报备，致使舒某独自一人在焊接现场违章作业时遭电击死亡。根据《刑法》，贾某将承担（）的法律后果。", "options": ["重大责任事故罪", "强令、组织他人违章冒险作业罪", "重大劳动安全事故罪", "危险作业罪"], "answer": "A", "explanation": "罪名：重大责任事故罪\n《刑法》第134条第1款规定，在生产、作业中违反有关安全管理的规定，因而发生重大伤亡事故或者造成其他严重后果的，处三年以下有期徒刑或者拘役；情节特别恶劣的，处三年以上七年以下有期徒刑。"}, {"id": 49, "type": "单选题", "stem": "2020年9月25日，被告人邵某以浙江某建设公司分公司的名义与某公司签订拆装钢构协议。同年11月16日，邵某作为实际施工方，雇佣无相应特种作业资质的盛某某等人，对某公司车间钢结构顶部的彩钢瓦 进行拆除。当天盛某某不慎从棚顶坠落当场死亡。经县应急管理局等部门成立的事故联合调查组调查，并报县人民政府批复，该起事故系一般生产安全责任事故，邵某承担主要责任。根据《刑法》，贾某将承担（）的法律后果。", "options": ["重大责任事故罪", "强令、组织他人违章冒险作业罪", "重大劳动安全事故罪", "危险作业罪"], "answer": "A", "explanation": "罪名：重大责任事故罪\n《刑法》第134条第1款规定，在生产、作业中违反有关安全管理的规定，因而发生重大伤亡事故或者造成其他严重后果的，处三年以下有期徒刑或者拘役；情节特别恶劣的，处三年以上七年以下有期徒刑。"}, {"id": 50, "type": "单选题", "stem": "2019年5月10日9时许，在丰满板纸公司污水处理车间，机修工张某在加装排水管上的闸板阀过程中，违章擅自进入封闭的污水池彩钢房，后中毒坠入池内引发事故，污水处理车间工人房自来、钱某在未采取任何防护措施的情况下，违规进入污水池盲目施救导致事故扩大。该事故造成张某、房自来、钱某死亡。被告人金某作为丰满板纸公司污水处理车间主任，安全教育培训不到位，致使员工对有限空间内有毒有害气体的危害性认识不足，在房自来、钱某进入有限空间内救人前没有及时告知配戴防毒面具，造成房自来、钱某二人因盲目施救而中毒后跌入污水池内溺亡，对事故的发生和扩大负有主要责任。根据《刑法》，金某将承担（）的法律后果。", "options": ["重大责任事故罪", "强令、组织他人违章冒险作业罪", "重大劳动安全事故罪", "危险作业罪"], "answer": "A", "explanation": "罪名：重大责任事故罪\n《刑法》第134条第1款规定，在生产、作业中违反有关安全管理的规定，因而发生重大伤亡事故或者造成其他严重后果的，处三年以下有期徒刑或者拘役；情节特别恶劣的，处三年以上七年以下有期徒刑。"}, {"id": 51, "type": "单选题", "stem": "2019年7月23日晚，常熟市泽众针织整理有限公司梳毛机生产线带班覃某在该公司白坯烫光车间上班期间，在梳毛机操作作业时手臂被梳毛机辊轮卷入导致受伤，后经送医院抢救无效于当晚死亡。经侦查，被告人赵某作为常熟市泽众针织整理有限公司厂长，负责公司日常生产经营活动，未履行安全生产管理职责，疏于安全生产管理工作，未及时发现并消除梳毛机出布口辊轮处防护栏缺失的事故隐患，未按规定为职工发放符合要求的劳动防护用品，对职工安全教育培训不到位，导致事故的发生。经法医学鉴定，被害人覃某死亡原因符合胸部外伤死亡。根据《刑法》，赵某将承担（）的法律后果。", "options": ["重大责任事故罪", "强令、组织他人违章冒险作业罪", "重大劳动安全事故罪", "危险作业罪"], "answer": "C", "explanation": "重大劳动安全事故罪：\n《刑法》第135条第1款规定，安全生产设施或者安全生产条件不符合国家规定，因而发生重大伤亡事故或者造成其他严重后果的，对直接负责的主管人员和其他直接责任人员，处三年以下有期徒刑或者拘役；情节特别恶劣的，处三年以上七年以下有期徒刑。"}, {"id": 52, "type": "单选题", "stem": "某企业的生产车间负责人李某,为了赶工期,不顾安全规定,强令工人在未通风的有限空间内进行作业,结果导致工人因缺氧而昏迷,其中两人因抢救无效而死亡。根据《刑法》，李某将承担（）的法律后果。", "options": ["重大责任事故罪", "强令、组织他人违章冒险作业罪", "重大劳动安全事故罪", "危险作业罪"], "answer": "B", "explanation": "强令、组织他人违章冒险作业罪（新修改）\n《刑法》修正案第134条第2款规定，强令他人违章冒险作业，或者明知存在重大事故隐患而不排除，仍冒险组织作业，因而发生重大伤亡事故或者造成其他严重后果的，处五年以下有期徒刑或者拘役；情节特别恶劣的，处五年以上有期徒刑。”"}, {"id": 53, "type": "单选题", "stem": "2024年2月，汪某某承包扎某某新建房屋工程，施工过程中汪某某负责劳务施工，房东扎某某提供所需机械及材料。2024年4月3日下午，在汪某某未到施工现场的情况下，现场施工工人周某与杨某站在地面上将钢筋传递给二楼的何某某、唐某某，在何某某、唐某某抓住钢筋后向楼顶邓某某和张某某转递时，钢筋触碰到新建房屋上方高压线，致使发生高压触电事故，该事故造成1人死亡，2人受伤。根据《刑法》，汪某某将承担（）的法律后果。", "options": ["重大责任事故罪", "强令、组织他人违章冒险作业罪", "重大劳动安全事故罪", "危险作业罪"], "answer": "B", "explanation": "强令、组织他人违章冒险作业罪（新修改）\n《刑法》修正案第134条第2款规定，强令他人违章冒险作业，或者明知存在重大事故隐患而不排除，仍冒险组织作业，因而发生重大伤亡事故或者造成其他严重后果的，处五年以下有期徒刑或者拘役；情节特别恶劣的，处五年以上有期徒刑。”"}, {"id": 54, "type": "单选题", "stem": "2020年，浙江省某酒店用品有限公司因安全生产需要，在油漆仓库等生产作业区域安装了可燃气体报警器。2021年10月，被告人李某远作为公司负责人为节约生产开支而擅自予以关闭。2022年5月10日，该公司作业区域发生火灾。同年5月16日至17日，消防部门对该公司进行检查，责令该公司立即整改，并将上述案件线索移送市公安局。经检验，公司存储的清面漆、固化剂均系易燃液体，属于危险化学品。根据《刑法》，李某将承担（）的法律后果。", "options": ["重大责任事故罪", "强令、组织他人违章冒险作业罪", "重大劳动安全事故罪", "危险作业罪"], "answer": "D", "explanation": "危险作业罪（新增加）\n《刑法》修正案（十一）规定，在刑法第一百三十四条后增加一条，作为第一百三十四条之一：“在生产、作业中违反有关安全管理的规定，有下列情形之一，具有发生重大伤亡事故或者其他严重后果的现实危险的，处一年以下有期徒刑、拘役或者管制：涉及安全生产的事项未经依法批准或者许可，擅自从事矿山开采、金属冶炼、建筑施工，以及危险物品生产、经营、储存等高度危险的生产作业活动的。”"}, {"id": 55, "type": "单选题", "stem": "2020年8月8日8时30分许，天津汇洋石油储运有限公司委托天津市大滩机电工程有限公司对二号装卸车站台原有弃用管线进行电气焊作业。汇洋公司总经理韩某、储运部负责人赵某某、安监部负责人刘某、机电部负责人（现场监火员）马某某违规开具《动火安全作业证》。随后，电焊工唐某某进场作业，现场监火员马某某擅自离开现场。现场监火员马某的行为（）。", "options": ["涉嫌违反《中华人民共和国安全生产法》", "涉嫌违反《中华人民共和国刑法》", "涉嫌违反《中华人民共和国合同法》", "涉嫌违反《中华人民共和国民法典》"], "answer": "A", "explanation": "《安全生产法》第四十三条规定：生产经营单位进行爆破、吊装、动火、临时用电以及国务院应急管理部门会同国务院有关部门规定的其他危险作业，应当安排（）进行现场安全管理，确保操作规程的遵守和安全措施的落实。"}, {"id": 56, "type": "判断题", "stem": "下雨天，车站地面湿滑，只要地面放置了警示牌，就可以免除法律责任。", "options": ["正确", "错误"], "answer": "B", "explanation": "根据《中华人民共和国民法典》第一千一百九十八条的规定，公共场所的经营者未尽到安全保障义务造成他人损害的，应当承担侵权责任。车站作为公共场所，负有法定安全保障义务，仅通过放置警示牌并不能完全履行这一义务。警示牌虽然可以起到提示作用，但更重要的是提前消除各种安全隐患，避免安全事故的发生‌"}, {"id": 57, "type": "单选题", "stem": "依据《南京市轨道交通条例》第五十条规定，乘客应当遵守乘客守则和公共秩序，以下可以携带进站、乘车的是（）：", "options": ["易燃、易爆、有毒和有放射性、腐蚀性等危险物品；", "活禽和猫、狗等动物，充气气球；", "电动代步工具、自行车；", "盲人携带的导盲犬、执行公务的军警犬、无障碍用途的电动轮椅、妥善包装且符合携带行李规定的折叠自行车"], "answer": "D", "explanation": "第五十条 乘客应当遵守乘客守则和公共秩序，不得携带下列物品进站、乘车：\n（一）易燃、易爆、有毒和有放射性、腐蚀性等危险物品；\n（二）活禽和猫、狗等动物（盲人携带的导盲犬、执行公务的军警犬除外），充气气球；\n（三）电动代步工具（无障碍用途的电动轮椅除外）、自行车（妥善包装且符合携带行李规定的折叠自行车除外）；"}, {"id": 58, "type": "单选题", "stem": "依据《南京市轨道交通条例》第五十三条规定，下列不属于危害或者可能危害轨道交通运营安全的行为的是（）。", "options": ["经过行调批准进入隧道、轨道施工作业；", "在轨道上放置、丢弃障碍物，向列车、工程车、轨道、通风亭、风井、接触网等设施设备投掷物品；", "吊机等施工机械作业半径侵入轨道交通限界；", "擅自操作有警示标志的按钮、开关、盖板、解锁手柄等装置，在非紧急状态下动用紧急或者安全装置；"], "answer": "A", "explanation": "擅自进入隧道、轨道或者其他有禁止进入标志标识的区域；"}, {"id": 59, "type": "单选题", "stem": "依据《南京市轨道交通条例》第五十五条、第五十六条、五十七条规定，以下说法错误的是（）。", "options": ["因节假日、大型群众活动等原因造成客流量上升的，轨道交通经营单位应当及时增加运力。", "发生轨道交通客流量激增等可能危及运营安全的情况时，轨道交通经营单位不得采取限流、封站、甩站等措施。", "因突发事件严重影响轨道交通安全的，轨道交通经营单位可以停止部分区段、全线或者全线网运营，组织乘客疏散，向市人民政府报告，并及时向社会公告。", "轨道交通运营发生安全事故，乘客应当听从轨道交通经营单位的现场指挥。"], "answer": "B", "explanation": "发生轨道交通客流量激增等可能危及运营安全的情况时，轨道交通经营单位可以采取限流、封站、甩站等措施，确保运营安全。"}, {"id": 60, "type": "单选题", "stem": "拒绝接受安全检查或者在安全检查中被发现携带禁止物品的，不得进站、乘车；已经进站的，轨道交通经营单位应当护送至目的地。", "options": ["正确", "错误"], "answer": "B", "explanation": "第五十一条 轨道交通经营单位应当设置必要的安全检查设施，有权按照有关标准和操作规范，对乘客及其携带的物品进行安全检查，乘客应当予以配合。拒绝接受安全检查或者在安全检查中被发现携带禁止物品的，不得进站、乘车；已经进站的，轨道交通经营单位应当责令其出站。\n公安机关应当对轨道交通安全检查工作进行指导、检查和监督，并依法处理安全检查中发现的违法行为。"}, {"id": 61, "type": "单选题", "stem": "以下不属于电客车驾驶模式的是（ ）。", "options": ["自动驾驶模式（AM）", "手动驾驶模式（CM）", "洗车模式（WM）", "紧急模式（EM）"], "answer": "D", "explanation": ""}, {"id": 62, "type": "单选题", "stem": "电客车紧急制动的触发条件不包括（ ）。", "options": ["警惕装置触发", "超速（≥88km/h）", "司机推快速制 e": "单选题", "stem": "运营突发事件现场管控权交接时，需填写什么记录？", "options": ["进场人员登记簿", "施工日志", "隐患整改单", "交接班记录"], "answer": "A", "explanation": ""}, {"id": 134, "type": "单选题", "stem": "动火作业中，未办理审批手续擅自动火的后果是？", "options": ["警告", "罚款", "按公司规定考核", "留司察看"], "answer": "C", "explanation": ""}, {"id": 135, "type": "单选题", "stem": "消防安全管理中，重点部位禁止火种带入，非工作人员进入需办理什么手续？", "options": ["登记手续", "审批手续", "无需手续", "领导批准"], "answer": "A", "explanation": ""}, {"id": 136, "type": "单选题", "stem": "外单位作业安全协议签订流程中，最后一步是？", "options": ["提交施工方案", "交纳保证金", "安监部审核", "签订协议"], "answer": "D", "explanation": ""}, {"id": 137, "type": "单选题", "stem": "禁烟管理中，各单位每季度需排查并备案什么情况？", "options": ["员工出勤情况", "吸烟情况", "设备运行情况", "消防设施情况"], "answer": "B", "explanation": ""}, {"id": 138, "type": "单选题", "stem": "易燃易爆危险品储存中，禁止使用什么工具？", "options": ["木质工具", "金属工具", "易产生火花的工具", "塑料工具"], "answer": "C", "explanation": ""}, {"id": 139, "type": "单选题", "stem": "运营公司安全生产检查中，班组每周检查的频率是？", "options": ["每天一次", "每周一次", "每半月一次", "每月一次"], "answer": "B", "explanation": ""}, {"id": 140, "type": "单选题", "stem": "动火作业分级中，高处 2 米以上的临时焊割属于哪一级？", "options": ["一级动火", "二级动火", "三级动火", "四级动火"], "answer": "B", "explanation": ""}, {"id": 141, "type": "单选题", "stem": "消防安全制度中，火灾事故处理遵循什么原则？", "options": ["三不放过", "四不放过", "五不放过", "六不放过"], "answer": "B", "explanation": ""}, {"id": 142, "type": "单选题", "stem": "2024年6月26日，某公司配料工人在操作电动葫芦进行卸料作业时将上半身探入进料平台，在其准备解开包装袋底部卸料口的捆扎带时吊带断裂，整个包装袋掉落，将其上半身挤压在进料平台上，经120抢救无效死亡。结合该案例，以下整改措施错误的是（）。", "options": ["吊装作业前，应对起重吊具进行安全检查确认，确保吊钩、索具、吊绳等关键部件处于完好状态。", "吊装作业时，吊物须绑扎牢固，吊升时应平稳，避免振动或摆动；吊物不得长时间悬在空中，吊物就位并使用可靠支撑后方可进行其他作业。", "加强吊装作业现场安全管理，作业范围应设置警戒线，吊臂及吊物下方严禁站人。", "吊装作业时，不用安排专门人员进行现场安全管理。"], "answer": "D", "explanation": "《安全生产法》第四十三条规定：生产经营单位进行爆破、吊装、动火、临时用电以及国务院应急管理部门会同国务院有关部门规定的其他危险作业，应当安排专门人员进行现场安全管理，确保操作规程的遵守和安全措施的落实。"}, {"id": 143, "type": "单选题", "stem": "2024年6月25日，某公司外包工人使用手动叉车搬运货物，行至一楼仓库门前，上坡途中货物失稳发生倾倒。工人手扶倾倒的货物时，被货物砸中压至地面，造成重伤。结合该案例，以下整改措施错误的是（）。", "options": ["叉车在叉载作业时，两叉应负荷均衡，叉臂保持水平状态，确保所载货物平稳可靠，严禁超载、偏载及单叉作业。", "操作手动叉车时，应保持匀速行驶，避免急转弯或突然停车，避免货物失稳倾倒伤人。", "经企业培训后方可上岗，严格遵守叉车作业安全规定。", "操作手动叉车时应注意通道及周边环境安全，避免撞击他人、设备或其他物品。"], "answer": "C", "explanation": "经特种作业培训且考试合格，持证方可上岗，严格遵守叉车作业安全规定。"}, {"id": 144, "type": "单选题", "stem": "2024年3月7日，某公司机修人员在维修冲床过程中，未及时清理遗落在冲床台面上的限位柱。启动设备时，限位柱弹出，击中维修人员致其死亡。结合该案例，以下整改措施错误的是（）。", "options": ["企业应制定设备设施检维修管理制度，定期开展安全教育和培训，提高员工安全意识，杜绝违章作业。", "检维修作业时，可以带电作业，须挂“有人作业、请勿操作”等标示牌，做好警示隔离，检维修人员须戴帆布手套。", "作业后，应及时恢复现场拆除的安全设施；", "应检查清理工器具，确保无遗漏并完成移交手续后方可撤场。"], "answer": "B", "explanation": "检维修作业时，必须切断设备电源，挂“禁止合闸，有人作业”等标示牌，做好警示隔离，检维修人员须正确佩戴劳动防护用品。"}, {"id": 145, "type": "单选题", "stem": "2024年5月21日，某公司工人违规作业，在未佩戴使用安全防护用品情况下攀爬固废压缩箱翻转架，处理掉入压缩箱内的垃圾桶，不慎滑落，头部撞击到地面，经120全力抢救无效死亡。结合该案例，以下整改措施错误的是（）。", "options": ["加强员工安全教育培训，切实提升员工的安全意识。", "员工应熟练掌握设备操作规程，杜绝违章作业。", "加强作业现场安全管理，登高攀爬要落实防滑措施，保持作业场所清洁，确保地面和设备表面无杂物、油渍或积水。", "确需高处作业时，作业人员需经验丰富、技能熟练，穿戴安全带、安全帽、防滑鞋等安全防护用品，正确使用安全梯、升降平台等登高设备。"], "answer": "D", "explanation": "确需高处作业时，作业人员需持证上岗，按规定穿戴好安全带、安全帽、防滑鞋等安全防护用品，正确使用安全梯、升降平台等登高设备。"}, {"id": 146, "type": "单选题", "stem": "2024年3月25日，某公司丝印部工人进行丝印作业时，将上半身伸入丝印机台清理油污，网架突然下压将其压于网架与承片台之间，经抢救无效死亡。结合该案例，以下整改措施错误的是（）。", "options": ["带电维机械时，须张贴安全警示标志，“严禁靠近正在清理、维修的设备”。", "加强岗位安全风险辨识，严格遵守操作规程，定期组织开展安全教育和培训。", "定期进行设备维护保养，确保防护栏、紧急停止按钮、红外光栅或感应联锁装置等安全装置完好有效。", "强化作业现场安全管理，落实防护措施，及时制止违规操作行为，杜绝违章作业。"], "answer": "A", "explanation": "在机械设备张贴安全警示标志，严禁在未切断电源的状态下清理、维修设备。"}, {"id": 147, "type": "单选题", "stem": "2025年7月22日7时许，武汉经济技术开发区一工地发生火灾，消防员接警后立即赶赴现场处置。8时9分，现场明火被扑灭。据了解，现场为屋顶起火，其他区域未过火，无人员伤亡。起火原因系该工程项目负责人庄某在明知工人特种作业操作证过期的情况下仍让工人对顶棚进行打磨作业，工人在打磨过程中产生的大量火星，引燃了周边的可燃物和阳光板引发火灾。结合该案例，以下做法正确的是（）。", "options": ["动火打磨作业无须审批，直接可以作业。", "特种作业操作证过期的情况下工人可以对顶棚进行打磨作业。", "动火作业点处须配备灭火器材，确保若发生火情，第一时间能够扑灭。", "动火作业可以在全密闭空间内进行。"], "answer": "C", "explanation": "动火打磨作业要经审批、特种作业证过期不得上岗作业、严禁在全密闭空间内动火。"}, {"id": 148, "type": "单选题", "stem": "2010年11月15日，上海市静安区胶州路一幢28层公寓楼发生特别重大火灾事故，共造成58人死亡、71人受伤。事故直接原因：施工人员违规在10层电梯前室北窗外进行电焊作业，电焊溅落的金属熔融物引燃下方9层位置脚手架防护平台上堆积的聚氨酯保温材料碎块、碎屑引发火灾。根据材料，以下做法正确的是（）。", "options": ["在附近有可燃物的场所需开展动火作业时，须有专人负责安全防护。", "电焊作业人员不需要取得特种作业资格。", "动火作业应配有灭火器，并有专人防护。", "非本职工作所取得的一、二级建造师证，可以用来挂靠赚取酬劳。"], "answer": "C", "explanation": "远离可燃物；须有特种证且未过期；不得挂靠"}, {"id": 149, "type": "单选题", "stem": "2014年11月6日晚高峰，33岁的河北籍女子潘某，在北京地铁五号线驶往天通苑北方向的惠新西街南口站，被夹在闭合的安全门和车门中。随后车子开动，潘小梅被挤后跌落站台。以上材料结合地铁工作实际，以下做法正确的是（）。", "options": ["员工发现有乘客夹在站台门与车门之间，应立即上前查看并尝试徒手扒门。", "地铁司机收到速度码后可以不用观察车门情况，直接动车。", "员工下班站台候车时，发现有人夹在站台门与车门之间，立即按压了紧急停车按钮。", "员工发现有乘客掉落站台后，应立即下轨行区施救。"], "answer": "C", "explanation": "地铁工作人员发现有乘客掉入轨行区或夹在车门与站台门之间，应立即按压站台紧急停车按钮并汇报车控室。            司机动车前应仔细观察夹人夹物情况。"}, {"id": 150, "type": "单选题", "stem": "2021年7月20日，郑州持续遭遇极端特大暴雨，致地铁5号线五龙口停车场及其周边区域发生严重积水现象，共有14人不幸遇难。关于恶劣天气，以下做法错误的是（）。", "options": ["暴雨来临，可在家门口放置挡水板、沙袋等防止进水，一旦进水应立即关闭电源、气源;危旧房屋、低洼地势居住人员应及时转移至安全地带。", "尽量不外出，如需外出，不要前往积水严重地段，不走地下通道，不贸然涉水，警惕水坑井盖;如驾车应减速慢行，注意避开积水和塌方路段。", "因天气原因外部大面积水淹，且积水通过车站任一敞口漫进车站，导致有水流入轨行区时，只要BAS系统排水正常，可以正常运营。", "司机发现前方轨行区积水淹至轨面，立即采取制动措施并向行调汇报。"], "answer": "C", "explanation": "因天气原因外部大面积水淹，且积水通过车站任一敞口漫进车站，导致有水流入轨行区时，值班主任立即组织该区域停运。"}, {"id": 151, "type": "单选题", "stem": "2021年7月20日，郑州持续遭遇极端特大暴雨，致地铁5号线五龙口停车场及其周边区域发生严重积水现象。经全力抢救，有14人不幸遇难。根据以上材料，结合运营防汛工作实际，以下做法正确的是（）。", "options": ["司机发现前方轨行区积水淹至轨面，立即采取制动措施并向行调汇报。", "排水不畅积水漫过轨底，属于安全红线。", "车站、轨行区淹水倒灌是指雨水等通过出入口、风亭、过渡段洞口等倒灌车站和轨行区，导致车站公共区积水浸泡或漫过钢轨轨面，属于B类运营险性事件。", "因天气原因外部大面积水淹，且积水通过车站任一敞口漫进车站，导致有水流入轨行区时，值班主任立即组织该区域跳停。"], "answer": "A", "explanation": "排水不畅积水漫过轨底，属于B类险性事件；车站、轨行区淹水倒灌是指雨水等通过出入口、风亭、过渡段洞口等倒灌车站和轨行区，导致车站公共区积水浸泡或漫过钢轨轨面，属于A类运营险性事件。因天气原因外部大面积水淹，且积水通过车站任一敞口漫进车站，导致有水流入轨行区时，值班主任立即组织该区域停运。"}, {"id": 152, "type": "单选题", "stem": "2022年11月21日，河南省安阳市文峰区安阳市凯信达商贸有限公司发生特别重大火灾事故，造成42人死亡、2人受伤，直接经济损失12311万元。经过调查组的调查认定，企业老板在没有任何防护、没有任何培训、没有取得焊工证的情况下冒险作业违章电焊，高温电焊火花引燃大火，蔓延成灾。结合该事件，以下做法错误的是（）。", "options": ["动火作业审批须明责任、严审批。", "动火作业经培训合格即可上岗。", "动火作业环境需远离可燃物，作业防护的灭火器要配齐。", "动火作业结束，清理现场须不留火患。"], "answer": "B", "explanation": "动火作业上岗必持证，且在有效期内。"}, {"id": 153, "type": "单选题", "stem": "2022年3月14日，内蒙古包头一公司发生火灾，造成7人死亡。事故直接原因是检维修作业人员在烟道垂直段内部进行热切割动火作业过程中，所产生的切割金属熔渣掉落引发火灾；火情扩大后，引燃了升温箱和烟道内防护层，火灾烟气窜入脱硫塔内，造成正在塔内作业的7人全部中毒窒息死亡。调查显示，此次事故中的部分项目部热切割作业和高处作业人员未经考核，无特种作业资格。根据材料，以下说法正确的是（）。", "options": ["动火作业不需要经过企业考核", "动火作业不需要经过企业审批", "动火作业须经审批且有专人防护", "动火作业不需要单独放置灭火器材"], "answer": "C", "explanation": ""}, {"id": 154, "type": "单选题", "stem": "2022年5月18日下午3点，金沙湖公园的下沉广场突发管涌，导致湖水大量外溢，进而使得金沙湖地铁站遭受了严重的涝水侵袭。面对这一紧急情况，相关部门迅速启动了应急预案，组织专业人员对管涌进行封堵，并全力排涝。所幸，现场人员已全部安全疏散，无人员被困。根据以上材料，结合运营防汛工作实际，以下说法错误的是（）。", "options": ["涉及到外部单位的防汛安全风险隐患，比如绿化侵限、第三方通道等，各相关单位应尽快完成辨识并与相关单位建立联络工作，督促做好接口处防汛措施。", "近几年短时突发极端降雨频发，若强降雨、江河湖泊高水位、泵站排水能力不足、第三方外部单位防汛工作未落实到位等多种不可控因素交织叠加，来水多、排水多，也有可能导致地铁点位积淹水甚至倒灌。", "各单位应强化现场处置方案中人员疏散环节，每个车站在汛前完成一次防汛实操应急处置和人员疏散演练。", "检查人员日常巡查中要关注周围河道、沟渠、施工、地形地貌、市政道路、建筑等变化，及时发现新的风险和隐患。"], "answer": "B", "explanation": "近几年短时突发极端降雨频发，若强降雨、江河湖泊高水位、泵站排水能力不足、第三方外部单位防汛工作未落实到位等多种不可控因素交织叠加，来水多、排水少，极有可能导致地铁点位积淹水甚至倒灌。"}, {"id": 155, "type": "单选题", "stem": "2022年6月9日，浙江省杭州市临平区的杭州冰雪大世界发生一起火灾事故，造成6人死亡，19人受伤，直接经济损失3057余万元。据调查，工作人员违章进行电焊切割作业，熔渣引燃了管道保温材料残片和装饰装修材料，导致火势蔓延成灾。结合该事件，以下说法错误的是（）。", "options": ["动火作业审批须明责任、严审批。", "动火作业上岗必持证。", "动火作业环境有可燃物，作业防护的灭火器要配齐。", "动火作业结束，清理现场须不留火患。"], "answer": "C", "explanation": "动火作业环境需远离可燃物，作业防护的灭火器要配齐。"}, {"id": 156, "type": "单选题", "stem": "2023年4月17日，位于浙江省金华市的浙江伟嘉利工贸有限公司发生一起重大火灾事故，导致11人死亡。事故调查组认定，该事故是一起因违法电焊施工引燃违规存放的拉丝调制漆引发火灾并迅速蔓延，业主违法搭建并改变厂房使用性质，导致疏散楼梯、自动消防设施等安全条件不符合规范，企业未开展应急救援演练导致人员死亡的重大生产安全责任事故。针对电气焊热切割作业人员的作业要求，以下错误的是（）。", "options": ["电气焊热切割作业人员，要上岗必持证", "电气焊热切割防护，灭火器要配齐", "电气焊热切割作业容器，先清洗再动火", "电气焊热切割作业容器，全封闭可作业"], "answer": "D", "explanation": "电气焊热切割作业容器，全封闭严禁作业"}, {"id": 157, "type": "单选题", "stem": "2023年8月29日凌晨3点左右，在美国纽约市，位于第40街和第七大道下一条已使用了127年的自来水总管破裂，导致时报广场的第42街地铁站严重漏水被淹，纽约地铁1、2、3号线运营受到影响。据介绍，主水管破裂后约90分钟才被关闭，这期间约180万加仑（约合681.37万升）水灌进地铁车站。纽约地铁1、2、3号线当天上午的大部分时间都暂停运营，直到中午才逐渐恢复服务。据悉，这三条地铁线路早高峰时段的客流量约为30万人次。根据以上材料，结合运营防汛工作实际，以下说法正确的是（）。", "options": ["相关单位须对已超出使用年限的车站用水或消防管道进行经常性检查。", "排水不畅积水漫过轨底，属于安全红线。", "车站、轨行区淹水倒灌是指雨水等通过出入口、风亭、过渡段洞口等倒灌车站和轨行区，导致车站公共区积水浸泡或漫过钢轨轨面，属于A类运营险性事件。", "强降雨或内涝倒灌所至的轨行区积水，区段积水超过轨面时，列车可以正常运行。"], "answer": "C", "explanation": "A、超过年限的不得使用;B、属于B类事件;D 、达到停运条件的，值班主任组织区段停运。"}, {"id": 158, "type": "单选题", "stem": "2024年10月27日，D5515/8次动车行驶至紫金山东站附近时，司机反馈动车组撞击异物，随车机械师在下车检查时被临线动车组撞击。10月29日，铁路相关部门通报了这起事故，称被撞人被发现时，已基本无生命体征。结合该起事故，以下做法错误的是（）。", "options": ["当跨越线路或通过平交道口时，应遵循‘一停、二看、三通过’的规则。", "工作人员在站台或可视相邻区域发现有人侵入轨行区，应立即上前营救。", "遇电客车异常抖动、走行部异响、弓网打火、接触网跳闸等情况，在专业人员未给出明确回复前，行车调度组织执行‘三检查一限速’。", "当发生树木侵限、轨行区设备掉落或其他外部异物掉落轨行区时，优先由轨道专业应急队现\r\r\n场处置。"], "answer": "B", "explanation": "应立即按压紧急停车按钮并向车控室报告。"}, {"id": 159, "type": "单选题", "stem": "2024年11月，大连市市场监督管理局在对某物业管理公司进行执法检查时发现，该公司新聘用的电梯安全管理员未持证直接开展安全检查作业。由于该公司使用未取得相应资格的人员从事特种设备安全管理，被责令停止使用涉案电梯并处一万元罚款。本事件中，该员工应取得（）证，方可作业。", "options": ["特种设备安全管理证", "电工作业（低压）", "高处作业证", "机电维修证"], "answer": "A", "explanation": ""}, {"id": 160, "type": "单选题", "stem": "2024年12月22日8时许，上海地铁11号线马陆至武威路站区间，由于外部一施工工地履带吊车倒塌侵入，造成地铁线路设备和一列正常运行的地铁局部受损，未造成人员伤亡。以上材料结合地铁工作实际，以下说法错误的是（）。", "options": ["地铁委外人员发现有外部单位在地铁沿线附近进行吊车作业，随后将该情况汇报给了沿线车站工作人员。", "车站工作人员收到信息后，立即将该信息汇报给了OCC。", "OCC收到该信息后，立即通知该区域列车加强观察。", "吊机等施工机械作业半径侵入轨道交通限界，违反了《南京市轨道交通条例》第五十三条规定。"], "answer": "C", "explanation": "OCC收到信息后，应立即通知该区域列车限速观察，并通知相关专业、地保办现场处置。"}, {"id": 161, "type": "单选题", "stem": "2024年2月23日，南京市雨花台区明尚西苑小区居民住宅6号楼发生重大火灾事故，造成15人死亡、2人重伤、42人轻伤或轻微伤，直接经济损失3300余万元。造成该起事故的直接原因是（）。", "options": ["涉事电动自行车的生产、销售企业违规出售不符合国家标准要求的电动自行车。", "涉事车主违规改装电动自行车、网络购买使用个体经营者非法生产销售的超标大容量锂离子电池。", "起火建筑部分住户在天井内违章搭建并堆放可燃物。", "电动自行车锂离子电池热失控起火，引燃周边电动自行车和住户天井内违章搭建并堆放的可燃物，燃烧产生的火焰和高温有毒有害烟气快速突破天井内部分住户外窗至室内，多种因素叠加导致火势扩大蔓延，造成人员伤亡。"], "answer": "D", "explanation": "ABC是间接原因"}, {"id": 162, "type": "单选题", "stem": "2025年9月13日23时40分许，某轨道交通运营企业，在车辆非运营期间，某线路存车线内，4名保洁人员穿越轨道时，被一辆返场检修的电客车碰撞，经紧急送医救治，3人抢救无效死亡，1名伤者经治疗正在康复之中。结合该案例，以下做法错误的是（）。", "options": ["车站工作人员应做好安全防护", "开展轨行区作业前，应征得施工请点批准", "有车站人员进行安全防护，施工单位无需安排专人防护。", "须按规定正确穿戴劳动防护用品"], "answer": "C", "explanation": ""}, {"id": 163, "type": "单选题", "stem": "劳动纪律在地铁运营管理中的主要作用是（ ）？", "options": ["提高列车运行速度", "规范员工的日常行为，确保合规性", "降低设备采购成本", "优化乘客购票流程"], "answer": "B", "explanation": ""}, {"id": 164, "type": "单选题", "stem": "地铁运营安全的三大关键举措中，哪一项侧重“技术层面的统一操作标准”？", "options": ["劳动纪律", "作业纪律", "作业标准化", "乘客服务规范"], "answer": "C", "explanation": ""}, {"id": 165, "type": "单选题", "stem": "“杜绝酒后上岗”的规定主要针对以下哪种风险？", "options": ["设备老化故障", "员工操作失误", "乘客投诉服务态度", "列车晚点"], "answer": "B", "explanation": ""}, {"id": 166, "type": "单选题", "stem": "地铁禁烟规定的根本目的是（ ）？", "options": ["降低保洁成本", "避免引发火灾", "减少员工休息时间", "提升乘客满意度"], "answer": "B", "explanation": ""}, {"id": 167, "type": "单选题", "stem": "施工上岗作业前必须取得的资质不包括以下哪一项？", "options": ["上岗证", "特种作业证", "施工负责人证", "普通话证"], "answer": "D", "explanation": ""}, {"id": 168, "type": "单选题", "stem": "以下哪种作业通常需要额外审批流程？", "options": ["日常设备巡检", "动火作业", "站厅保洁", "乘客引导"], "answer": "B", "explanation": ""}, {"id": 169, "type": "单选题", "stem": "“工完场清”的主要目的是（  ）？", "options": ["提高工作效率", "防止侵限等安全事故", "减少设备损耗", "美化工作环境"], "answer": "B", "explanation": ""}, {"id": 170, "type": "单选题", "stem": "“三不动”原则中，不包括以下哪一项？", "options": ["未联系登记好不动", "对设备性能状况不清楚不动", "正在检修的设备不动", "正在使用中的设备不动"], "answer": "C", "explanation": ""}, {"id": 171, "type": "单选题", "stem": "根据“三不离”原则，以下哪种情况允许工作人员离开作业现场？", "options": ["工作完成后，设备未进行试验确认状态良好", "设备存在影响正常使用的缺陷但已记录上报", "发现设备有异常情况但原因尚未查明", "设备经过彻底试验确认运行正常，无遗留问题"], "answer": "D", "explanation": ""}, {"id": 172, "type": "单选题", "stem": "擅自移动工作现场的什么设施可能导致人员伤亡？", "options": ["办公桌椅", "围挡和警示牌", "施工材料", "个人物品"], "answer": "B", "explanation": ""}, {"id": 173, "type": "单选题", "stem": "下列哪个区域不属于限制区域？", "options": ["员工休息室", "轨行区", "调度大厅", "气灭保护区"], "answer": "A", "explanation": ""}, {"id": 174, "type": "单选题", "stem": "（）指的是通过制定、执行和迭代统一的技术标准、操作流程及管理程序，实现作业行为的可复制性、可验证性和风险可控性。其作用是保障“活”的质量效率，减少人为因素造成的质量差异，追求执行精准度。", "options": ["劳动纪律", "作业纪律", "作业标准化", "培训纪律"], "answer": "C", "explanation": ""}, {"id": 175, "type": "单选题", "stem": "2025年5月19日，苏某驾驶小汽车搭载4人沿环莞快速路，超速行驶至虎门一水库特大桥路段时，冲破防撞沙桶和护栏后坠桥，造成车上5名司乘人员受伤，后经送医抢救无效死亡。结合该事故案例，以下说法正确的是（）。", "options": ["在施工现场或危险区域放置了警示牌，可以避免发生安全事故。", "所有施工现场或危险区域都应当设置围挡，起到物理隔绝，能够防止安全事故发生。", "围挡、警示牌、安全设施用于保障工作现场安全，擅自移动可能导致人员伤亡。", "在人员密集的场所施工，只要不动火、不影响客流，可以不用围挡施工。"], "answer": "C", "explanation": "A警示牌及围挡；B不是所有；D需要"}, {"id": 176, "type": "单选题", "stem": "2024年5月26日，在某公司的生产车间内，叉车司机在自西向东行驶时，撞上了突然进入车间通道的工人，导致其被卷入车底，该名工人不幸离世。结合该事故案例，以下说法错误的是（）。", "options": ["员工看到车辆时，应尽量远离，防止误伤。", "基地内员工看到平交道口有列车正在驶来，应快速通过。", "驾驶员驾驶车辆时，按规定慢速运行、礼让行人。", "不得酒驾或服用精神类药物驾驶机动车。"], "answer": "B", "explanation": "基地内员工看到平交道口有列车驶来，应耐心等待。"}, {"id": 177, "type": "单选题", "stem": "2024年5月21日，某公司员工在处理掉入固废压缩箱内的垃圾桶时，因违规作业且未佩戴劳动防护用品（安全帽），不慎从翻转架上跌落，最终不幸离世。结合该事故案例，以下说法错误的是（）。", "options": ["该作业无须安排现场监护人员", "该员工未按规定佩戴安全绳", "该员工未按规定佩戴安全帽", "安全绳严禁低挂高用"], "answer": "A", "explanation": "该作业需安排现场监护人员"}, {"id": 178, "type": "单选题", "stem": "2022年6月14日上午9时许，王某到达工作岗位，在处理完相关事务后，便在10点半左右离开了，回到其在单位内的住所。不久后，王某的家人来到该单位的办公区，向王某的同事求助，说王某在厨房炒菜时突然晕倒。王某的同事赶到王某家中后，发现王某侧躺在厨房地上。王某的同事立即将其送医救治，但因抢救无效，王某当天中午被宣告死亡，死因为心源性猝死。该案例中，王某的行为属于违反了（）。", "options": ["劳动纪律", "作业纪律", "作业标准化", "培训纪律"], "answer": "A", "explanation": "严守考勤制度，坚守工作岗位。"}, {"id": 179, "type": "单选题", "stem": "2020年8月，某化工厂发生一起重大爆炸事故，造成3人死亡，直接经济损失达2000万元。事故原因是操作工王某在交接班时未如实告知反应釜压力异常情况，接班工人李某也未按规定进行压力检测就直接投料生产。当反应釜压力达到警戒值时，李某未按规程采取紧急泄压措施，而是试图继续完成当班生产任务，最终导致反应釜超压爆炸。结合该事件，以下说法正确的是（）。", "options": ["王某无需承担相关事故责任。", "李某未按规定进行压力检测就直接投料生产，该行为属于违反了劳动纪律。", "王某和张某俩人严重违反了标准化作业流程", "该案例属于设备问题，非人为行为。"], "answer": "C", "explanation": "王某需承担事故责任；李某违反了作业标准化规定；属于人为事故。"}, {"id": 180, "type": "单选题", "stem": "2019年11月，某建筑工地发生模板支撑体系坍塌事故，造成5名工人被埋，其中2人死亡。经调查，事故直接原因是施工队为赶工期，擅自改变模板支撑方案，将规定的钢管支撑改为木支撑，且未按要求进行验收。同时，监理人员发现后仅做口头警告，未采取强制停工措施。更深层次的原因是项目部为降低成本，默许施工队减少安全投入，日常安全检查形同虚设。结合该事件，以下说法错误的是（）。", "options": ["属于重效益轻安全，与两纪一化无关。", "规章制度执行不力，监管流于形式。", "职工安全意识淡薄，存在侥幸心理。", "监理人员负有现场监管责任，发现问题未采取强制停工措施。"], "answer": "A", "explanation": "严重违反作业纪律、作业标准化流程"}, {"id": 181, "type": "单选题", "stem": "2018年5月，某钢铁企业炼钢车间发生一起高空坠落事故。当天上午9时许，维修工张某在未系安全带的情况下，擅自攀爬至15米高的钢架进行设备检修作业。当时车间主任发现后曾进行制止，但张某以“经验丰富、马上就好”为由继续作业。10时15分，张某在移动过程中不慎踩空，从高空坠落，经抢救无效死亡。结合该事件，以下说法错误的是（）。", "options": ["张某未按规定佩戴安全带", "张某违反了标准化作业流程", "车间主任尽到了提醒告知义务，无需承担相关事故责任。", "该企业安全警示教育不足，张某存在侥幸心理。"], "answer": "C", "explanation": "未严格执行现场监督职责，未制止违章作业。"}, {"id": 182, "type": "单选题", "stem": "1987年11月18日晚，英国伦敦国王十字车站，有人在乘坐地铁出站的自动扶梯上点着香烟后，随手将火柴梗扔进了扶梯缝隙内，点燃了扶梯下面沉积的润滑油脂、可燃的纤维和碎屑等可燃物质。现场执勤警察发现着火，从地铁站内上到地面向消防总队报警，因为他们的无线通信设备在地下受到屏蔽而不起作用。地铁站的检查员使用二氧化碳灭火器灭火没能奏效。地铁公司在扶梯下安装了自动喷水设备，但检查员嫌灭火后清除积水太麻烦，擅自关闭了进水阀，使自动喷水设备没有发挥应有的作用。消防车到场，这时火焰产生的热气流已烧着了扶梯上部天花板和墙壁广告板表面的油漆，冒出了浓浓的黑烟，消防员还没来得灭火，火焰就蹿入了售票厅，由于得到新鲜空气的补充，突然引发爆燃。火灾最终造成31人死亡，其中包括最先到达现场的1名清防队长和6名消防员，还有100多人受伤。关于以下说法，正确的是（）。", "options": ["地铁工作人员发现乘客吸烟后，应及时上前劝阻，对劝阻不了的，在旁监督。", "车站自动扶梯附近的杂物巡查及清理工作应由维保单位负责。", "严禁违规吸烟指的是不可在禁烟范围内吸烟，因为可能引发火灾。", "自动灭火系统正确安装后，需不定期组织巡检、维护。"], "answer": "C", "explanation": ""}, {"id": 183, "type": "单选题", "stem": "某日，上级领导准备四不两直前往某线路设备房检查，陪同张某立即电话给李某检查的消息，李某接到通知后和巡检工赵某提前前往各个设备房补全了半年以来的漏巡检记录。结合该事件，以下说法正确的是（）。", "options": ["张某可以将检查的消息告知李某", "李某和赵某补全了半年的巡检记录是制度允许的", "李某和赵某的行为违反了“两纪一化”", "由于设备引发的险性事件，调查人员不会调取巡检记录"], "answer": "C", "explanation": "违反标准化作业流程及弄虚作假"}, {"id": 184, "type": "单选题", "stem": "宋某为某物业公司维修职工，工作岗位为公共维修。一日深夜，小区水泵房突发故障，老宋第一时间赶赴现场抢修汽油机水泵。然而，在水泵房抢修汽油机水泵作业时，意外死亡。经司法鉴定，老宋心血中乙醇含量高达114.6mg/100ml，远超法定醉酒标准。宋某的行为属于违反了（）。", "options": ["劳动纪律", "作业纪律", "作业标准化", "培训纪律"], "answer": "A", "explanation": "杜绝酒后上岗"}, {"id": 185, "type": "判断题", "stem": "外单位作业前无需交纳安全保证金，只需签订协议即可。", "options": ["正确", "错误"], "answer": "B", "explanation": "需交纳保证金并签订协议"}, {"id": 186, "type": "判断题", "stem": "禁烟范围内可以使用茶叶盒作为临时烟灰缸。", "options": ["正确", "错误"], "answer": "B", "explanation": "禁止摆放任何烟灰缸"}, {"id": 187, "type": "判断题", "stem": "一级动火作业许可证有效期为7天。", "options": ["正确", "错误"], "answer": "B", "explanation": "有效期不超过 24 小时"}, {"id": 188, "type": "判断题", "stem": "易燃易爆危险品废弃处置可随意丢弃。", "options": ["正确", "错误"], "answer": "B", "explanation": "需委托有资质单位处理"}, {"id": 189, "type": "判断题", "stem": "运营突发事件现场允许未经授权人员拍照。", "options": ["正确", "错误"], "answer": "B", "explanation": "非授权人员严禁拍照"}, {"id": 190, "type": "判断题", "stem": "外单位施工负责人需取得《施工负责人合格证》方可上岗。", "options": ["正确", "错误"], "answer": "A", "explanation": ""}, {"id": 191, "type": "判断题", "stem": "动火作业中，氧气瓶与动火作业地点间距应大于 5 米", "options": ["正确", "错误"], "answer": "B", "explanation": "应大于 10 米"}, {"id": 192, "type": "判断题", "stem": "禁烟管理中，公共区域烟头未及时清理，属地单位需承担责任", "options": ["正确", "错误"], "answer": "A", "explanation": ""}, {"id": 193, "type": "判断题", "stem": "易燃易爆危险品储存中，禁忌物料可混合存放。", "options": ["正确", "错误"], "answer": "B", "explanation": "禁止混合存放"}, {"id": 194, "type": "判断题", "stem": "运营公司安全生产检查中，班组每月检查一次。", "options": ["正确", "错误"], "answer": "B", "explanation": "班组每周检查一次"}, {"id": 195, "type": "判断题", "stem": "外单位作业安全保证金考核中，未落实整改措施将扣除全部保证金。", "options": ["正确", "错误"], "answer": "B", "explanation": "按情节考核 1000 元至全部保证金"}, {"id": 196, "type": "判断题", "stem": "动火作业超过有效期需重新办理许可证。", "options": ["正确", "错误"], "answer": "A", "explanation": ""}, {"id": 197, "type": "判断题", "stem": "禁烟范围包括车辆基地非吸烟区。", "options": ["正确", "错误"], "answer": "A", "explanation": ""}, {"id": 198, "type": "判断题", "stem": "易燃易爆危险品运输中，夜间装卸必须使用明火照明。", "options": ["正确", "错误"], "answer": "B", "explanation": "禁止明火照明"}, {"id": 199, "type": "判断题", "stem": "外单位作业安全协议签订必须由法定代表人或授权委托人办理。", "options": ["正确", "错误"], "answer": "A", "explanation": ""}, {"id": 200, "type": "判断题", "stem": "动火作业中，五级风以上天气禁止露天动火。", "options": ["正确", "错误"], "answer": "B", "explanation": "原则上禁止，确需动火需升级管理"}, {"id": 201, "type": "判断题", "stem": "为了工作方便，可以临时移动围挡，工作完再放回原处。", "options": ["正确", "错误"], "answer": "B", "explanation": "影响安全"}, {"id": 202, "type": "判断题", "stem": "轨行区是限制区域，但司机室可以自由进出。", "options": ["正确", "错误"], "answer": "B", "explanation": "不得自由进出"}, {"id": 203, "type": "判断题", "stem": "劳动纪律仅需规范员工的考勤行为，其他方面无需约束。", "options": ["正确", "错误"], "answer": "B", "explanation": "履约纪律、考勤纪律、生产纪律、安全卫生纪律、日常工作生活纪律、保密纪律、其他纪律"}, {"id": 204, "type": "判断题", "stem": "作业标准化的目的是通过统一操作流程，提高安全性和效率。", "options": ["正确", "错误"], "answer": "A", "explanation": ""}, {"id": 205, "type": "判断题", "stem": "班前饮酒但未醉酒，仍可允许上岗作业。", "options": ["正确", "错误"], "answer": "B", "explanation": "严禁班前班中饮酒。"}, {"id": 206, "type": "判断题", "stem": "工作场所堆放私人物品属于“保持场所整洁”的合规行为。", "options": ["正确", "错误"], "answer": "B", "explanation": "不属于"}, {"id": 207, "type": "判断题", "stem": "未取得特种作业证的人员可临时参与高风险作业，只要有人监督即可。", "options": ["正确", "错误"], "answer": "B", "explanation": "严禁未持证开展特种作业。"}, {"id": 208, "type": "单选题", "stem": "（）是根据安全生产法律法规和相关标准要求，在生产经营活动中，根据岗位的性质、特点和具体工作，明确所有层级、各类岗位从业人员的安全生产责任，通过安全生产责任清单、履职清单、考评清单，有效落实企业安全生产主体责任，建立起安全生产工作“层层负责、人人有责、各负其责”的工作体系。", "options": ["三管三必须", "全员安全生产责任", "谁主管、谁负责", "安全生产第一责任人"], "answer": "B", "explanation": ""}, {"id": 209, "type": "单选题", "stem": "班（组）长的安全生产责任清单不包含（）。", "options": ["履行班（组）安全生产第一责任人职责，严格遵守执行公司各项规章制度；", "每周召开安全生产会议，研究部署近期安全生产重点工作；", "每天召开班前会，开展班前安全教育，告知近期公司运营情况或公司安全生产关注点；", "加强班（组）安全培训，督促班（组）人员熟知工作岗位存在的危险因素、防范措施及事故应急措施。"], "answer": "C", "explanation": "每天召开班前会，开展班前安全教育，告知班（组）作业区域的主要安全生产风险点、防范措施和事故应急措施，做好技术交底；"}, {"id": 210, "type": "单选题", "stem": "班（组）长为班（组）的第一安全责任人，其安全生产责任清单不包含（）。", "options": ["严格执行本单位安全风险分级管控和隐患排查治理各项工作制度；", "组织开展班前、班中、班后安全检查或交接班检查，对班（组）作业区域进行安全风险隐患排查，落实安全防范措施，并做好相关记录；", "提醒班（组）人员按本单位的安全生产规章制度和岗位安全操作规程，佩戴和使用劳动防护用品；", "对作业中发生的险情、突发事件及时报告，组织事故初期应急处置并采取措施保护现场。"], "answer": "C", "explanation": "督促班（组）人员严格遵守本单位的安全生产规章制度和岗位安全操作规程，正确佩戴和使用劳动防护用品。"}, {"id": 211, "type": "单选题", "stem": "各单位应明确除安全生产管理人员以外的其他各岗位人员安全生产职责,关于其他各岗位人员安全生产责任清单不正确的是（）:", "options": ["各级员工在各自的工作范围内，认真履行各自岗位赋予的安全职责，严格落实岗位安全责任,对本岗位的安全生产负直接责任；", "自觉贯彻国家有关安全生产法律、法规的规定和有关国家、行业标准的要求，参加公司开展的各级安全生产教育和培训；", "学习和遵守公司、本岗位的各项安全生产规章制度，熟练掌握本职工作所需的安全生产知识，依据本岗位性质、特点和具体工作内容，签订安全生产目标责任书和安全承诺书；", "执行本专业、岗位的安全操作规程，了解本岗位的风险点。"], "answer": "D", "explanation": "执行本专业、岗位的安全操作规程，熟悉本岗位的安全风险、隐患及所应采取的防范措施。"}, {"id": 212, "type": "单选题", "stem": "各单位应明确除安全生产管理人员以外的其他各岗位人员安全生产职责,关于其他各岗位人员安全生产责任清单不包含（）:", "options": ["做好设施设备的维护检修;有效辨识和防范安全风险，有效排查安全隐患，落实整改措施:参与安全生产管理信息化系统建设工作;从事特种作业的必须经培训取得相应的资格证书。", "正确分析、判断和处理各类重大危险源，把事故消灭在萌芽状态，处理完后及时向现场安全人员或者相关负责人报告。", "发生突发事件时，及时向上级报告，按照相关现场处置方案和应急预案正确处理，并保护现场，做好详细记录；参与运营公司内部生产安全事故、事件的调查处理。", "服从管理，不违章作业，拒绝不符合安全生产的违章指挥，正确佩戴和使用劳动防护用品，保护自身安全。"], "answer": "B", "explanation": "正确分析、判断和处理各种不安全因素和事故苗头，把事故消灭在萌芽状态，并向现场安全人员或者相关负责人报告，接到报告的人员及时予以处理。"}, {"id": 213, "type": "单选题", "stem": "各单位应明确除安全生产管理人员以外的其他各岗位人员安全生产职责,关于其他各岗位人员安全生产责任清单正确的是（）:", "options": ["做好设施设备的检查工作；", "有效辨识和防范安全风险，有效排查安全隐患，制定整改措施；", "参与安全生产管理信息化系统建设工作；", "从事特种作业的必须经过培训方可上岗。"], "answer": "C", "explanation": "做好设施设备的维护检修；有效辨识和防范安全风险，有效排查安全隐患，落实整改措施；从事特种作业的必须经培训取得相应的资格证书。"}, {"id": 214, "type": "判断题", "stem": "同一作业场所存在不同种类的危险、有害因素的，为了便捷性，可以使用固定的劳动防护用品。", "options": ["正确", "错误"], "answer": "B", "explanation": "同一作业场所存在不同种类的危险、有害因素的，应当同时提供防御各类危害的劳动防护用品，并应考虑不同劳动防护用品的可兼容性。"}, {"id": 215, "type": "判断题", "stem": "巡检等流动性作业人员，应当在固定位置配备个人应急防护用品。", "options": ["正确", "错误"], "answer": "B", "explanation": "巡检等流动性作业人员，应当配备随身携带的个人应急防护用品。"}, {"id": 216, "type": "单选题", "stem": "关于劳动防护用品的使用，以下说法正确的是（）。", "options": ["作业人员应自学劳动防护用品的使用、维护等专业知识。", "作业人员在使用劳动防护用品前，必须进行检查，确保外观完好、部件齐全、功能正常。", "员工在作业过程中，必须佩戴和使用劳动防护用品；未佩戴和使用劳动防护用品的，不得上岗作业。", "绝缘类劳动防护用品及安全带须进行一次性耐压、耐力试验。"], "answer": "B", "explanation": "各单位应对作业人员进行劳动防护用品的使用、维护等专业知识的培训。作业人员在使用劳动防护用品前，必须进行检查，确保外观完好、部件齐全、功能正常。员工在作业过程中，必须按照安全生产规章制度和劳动防护用品使用规则，正确佩戴和使用劳动防护用品；未按规定佩戴和使用劳动防护用品的，不得上岗作业。绝缘类劳动防护用品及安全带按周期进行耐压、耐力试验，严禁使用过期不检或检测不合格产品。"}, {"id": 217, "type": "单选题", "stem": "关于外单位安全生产管理，以下说法正确的是（）。", "options": ["同一作业区域内存在两个以上生产经营单位进行生产经营活动，可能危及对方生产安全的，应当约定安全管理责任，明确各自的安全生产管理职责和应当采取的安全措施，", "同一作业区域内存在两个以上生产经营单位进行生产经营活动，指定兼职安全生产管理人员进行安全检查与协调。", "各单位应当将接受其作业指令的被派遣劳动者、灵活用工人员纳入本单位对从业人员的统一管理，履行安全生产保障责任，可以将一部分安全生产保障责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。", "外单位违反运营公司相关安全管理规定，归口管理单位纳入运营公司月度安全绩效考核。"], "answer": "D", "explanation": "同一作业区域内存在两个以上生产经营单位进行生产经营活动，可能危及对方生产安全的，应当签订安全管理协议，明确各自的安全生产管理职责和应当采取的安全措施，并指定专职安全生产管理人员进行安全检查与协调。各单位应当将接受其作业指令的被派遣劳动者、灵活用工人员纳入本单位对从业人员的统一管理，履行安全生产保障责任，不得将安全生产保障责任转移给劳务派遣单位或者被派遣劳动者、灵活用工人员。"}, {"id": 218, "type": "单选题", "stem": "在进行接触网停电及挂接地线作业时，施工负责人必须特别注意（）？", "options": ["自行判断停电时间，并指挥作业人员挂接地线", "取得设备运行调度的许可后，再组织设置安全防护", "向所有施工人员告知后，即可设置安全防护", "在完成请点手续后，即可立即组织挂接地线"], "answer": "B", "explanation": ""}, {"id": 219, "type": "单选题", "stem": "关于施工人员资质管理，施工负责人的职责是（）？", "options": ["负责对所有施工人员进行专业技能培训", "负责向考试机构申请办理特种作业证件", "负责核实现场人员的特种作业操作证情 断题", "stem": "施工计划兑现率中，日补充计划要求100%。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 312, "type": "判断题", "stem": "轨行区施工结束后，工器具未出清但未侵限，不考核。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "未出清未侵限仍考核"}, {"id": 313, "type": "判断题", "stem": "非行车类D类施工属地管理中，灵山大厦一级属地单位是后勤保障事业部。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 314, "type": "判断题", "stem": "施工负责人可以冒名顶替参与作业。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "冒名顶替考核"}, {"id": 315, "type": "判断题", "stem": "工程车与作业人员同一区域作业时，人员可在列车后方50米内作业。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "人员与列车需保持50米以上安全间隔"}, {"id": 316, "type": "判断题", "stem": "外单位轨行区巡检类作业可由施工单位专人旁站监督。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 317, "type": "判断题", "stem": "施工预备会记录需保存至少一年。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 318, "type": "判断题", "stem": "调试负责人可以同时负责多项调试作业。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "规定同一时间段内只能负责一项调试作业"}, {"id": 319, "type": "判断题", "stem": "试车线调试时，允许切除信号防护设备进行调试（调试项目需无ATP保护时除外）。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 320, "type": "判断题", "stem": "调试司机无需核对调试负责人身份即可动车。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "调试司机需核对调试负责人身份并签字确认"}, {"id": 321, "type": "判断题", "stem": "未接管电客车调试方案需经运营公司相关单位会签后实施。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 322, "type": "判断题", "stem": "正线调试作业可以安排在运营时间内进行，无需特殊审批。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "运营时间内调试需提前2个工作日下达方案并办理手续"}, {"id": 323, "type": "判断题", "stem": "调试列车在试车线最高运行速度不得超过该试车线设计速度。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 324, "type": "判断题", "stem": "调试负责人未取得作业证可以临时上岗。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "必须取得《运营公司施工负责人作业A证》方可上岗"}, {"id": 325, "type": "判断题", "stem": "未接管电客车调试时，信号未取得安全认证前可直接进行正线测试。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "需加强风险辨识并制定管控措施后方可实施"}, {"id": 326, "type": "判断题", "stem": "调试方案会签后，相关单位无需制定本单位安全措施。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "相关单位需制定本单位安全措施"}, {"id": 327, "type": "判断题", "stem": "试车线调试时，雾天能见度小于50m可进行调试。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "能见度小于50m时严禁进行调试"}, {"id": 328, "type": "判断题", "stem": "调试司机连续操纵列车1小时需休息至少10分钟。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 329, "type": "判断题", "stem": "未接管电客车调试责任主体是运营公司车辆分公司。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "责任主体是调试需求单位（如供应商）"}, {"id": 330, "type": "判断题", "stem": "调试作业中，调试人员可擅自开关车门。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "擅自开关车门需经调试负责人同意"}, {"id": 331, "type": "判断题", "stem": "调试负责人培训考试不合格需重新参加培训。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 332, "type": "判断题", "stem": "正线调试时，允许超范围、超时间调试。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "绝对禁止超范围、超时间调试"}, {"id": 333, "type": "判断题", "stem": "调试方案中需明确各速度等级下的紧急制动距离。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 334, "type": "判断题", "stem": "试车线调试时，夜间时段允许进行调试。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "夜间时段严禁在试车线调试"}, {"id": 335, "type": "判断题", "stem": "调试司机发现列车技术状态异常时，应继续调试并汇报。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "应立即停止调试并汇报"}, {"id": 336, "type": "判断题", "stem": "调试作业中，调试负责人指令不明确时，司机有权拒绝动车。", "options": ["正确", "错误", "—", "—"], "answer": "A", "explanation": ""}, {"id": 337, "type": "判断题", "stem": "未接管电客车调试方案可超出本标准安全规定，无需审批。", "options": ["正确", "错误", "—", "—"], "answer": "B", "explanation": "超出需经专项会议制定保障方案并会签"}, {"id": 338, "type": "单选题", "stem": "关于用电安全，以下正确的是（）。", "options": ["外部用电用户用电施工人员必须是具备相应工作经验的人。", "安装好的临时线路，其他部门的人员可以更改或搭接使用。", "临时用电，不得超过使用期限，使用完毕后，由施工单位负责自行拆除，如未经同意，超期不拆除者将对其进行停电处理。", "可以在一类负荷上引接电源。"], "answer": "C", "explanation": "外部用电用户用电施工人员必须是具备相应工作经验的电工，持有电工上岗证。安装好的临时线路，专线专用，其他任何部门的人员不得擅自更改或搭接使用。为保证各类应急照明用电及其他一类负荷的正常使用，严禁在一类负荷上引接电源。"}, {"id": 339, "type": "单选题", "stem": "关于用电安全，以下不正确的是（）。", "options": ["现场连续使用电源超过一年以上的用电统称为固定用电。", "临时用电是指因为施工,现场生产或外单位商业活动等原因,需要临时提供电源的行为，不用办理相关手续。", "用电线路必须保证绝缘良好，使用负荷正确，接头处包扎可靠，全线无裸露。", "车站内，所有的低压电气线路都必须采用低卤无毒耐火电缆，部分防火等级略低的场所，可以采用低卤无毒阻燃或阻燃A级的电线、电缆，须提供电线电缆的检验报告和合格证。"], "answer": "B", "explanation": "临时用电是指因为施工,现场生产或外单位商业活动等原因,需要临时提供电源的行为，需办理相关手续。"}, {"id": 340, "type": "单选题", "stem": "关于用电安全，以下说法错误的是（）。", "options": ["用电线路一般不得任意拖地，如确系需要应加装可靠的套管:移动电缆线应做好保护，防止机械损伤或破损割断电线，造成短路。", "用电线路装置，必须有一个总开关，分开关供电。每一分路开关必须加有漏电保护装置，装在户外的开关、熔断器等电气设备应有防水措施。", "低压电气线路所带负荷必须满足上一级开关的设定，配线截面积必须满足负荷的需要。", "设备的电源线尽量接至插座，无法满足的应做好线路绝缘保护，防止漏电。"], "answer": "D", "explanation": "设备的电源线一律接至插座，设备与插座之间的电源线沿地面敷设，加盖不锈钢的槽板。槽板须固定牢靠。"}, {"id": 341, "type": "单选题", "stem": "关于运营公司用水管理规定，以下说法错误的是（）。", "options": ["运营公司以外用水用户，须遵守、服从运营公司用水管理，对各自用水设施、管路进行定期维护和巡检，必要时可变动用水计量装置。", "用水用户应节约用水和保证安全用水，所用用水设备需符合相关规范要求，避免发生事故，维护公共安全。", "各单位应经常进行节约用水的教育，增强全体员工的节约用水意识。", "各单位要定期做好各自用水设施设备的维修保养工作，确保其处于完好状态。"], "answer": "A", "explanation": "运营公司以外用水用户，须遵守、服从运营公司用水管理，对各自用水设施、管路进行定期维护和巡检，避免不必要的水资源浪费。"}, {"id": 342, "type": "单选题", "stem": "（）指操作过程安全风险较大，易发生人身伤亡或设备损坏，安全事故后果严重，需要采取特别控制措施的作业。", "options": ["危险作业", "特种作业", "动火作业", "高处作业"], "answer": "A", "explanation": ""}, {"id": 343, "type": "单选题", "stem": "（）指容易发生事故，对操作者本人、他人的安全健康及设备、设施的安全可能造成重大危害的作业。", "options": ["危险作业", "特种作业", "动火作业", "高处作业"], "answer": "B", "explanation": ""}, {"id": 344, "type": "单选题", "stem": "（）指在禁火区进行焊接、切割作业及在易燃易爆场所使用电焊、气焊（割）、喷灯、电钻、砂轮等进行可能产生火焰、火花贺炽热表面的临时性作业。", "options": ["危险作业", "特种作业", "动火作业", "高处作业"], "answer": "C", "explanation": ""}, {"id": 345, "type": "单选题", "stem": "（）在距坠落高度基准面2米及以上有可能坠落的高处进行的作业。", "options": ["危险作业", "特种作业", "动火作业", "高处作业"], "answer": "D", "explanation": ""}, {"id": 346, "type": "单选题", "stem": "（）指作业人员进入或探入有限空间实施的作业活动。", "options": ["危险作业", "特种作业", "动火作业", "有限空间作业"], "answer": "D", "explanation": ""}, {"id": 347, "type": "单选题", "stem": "（）指封闭或者部分封闭，与外界相对隔离，进出口受到限制，作业人员不能长时间在内工作，通风不良，易造成有毒有害、易燃易爆物质积聚或者氧含量不足的空间。", "options": ["危险作业", "特种作业", "动火作业", "有限空间"], "answer": "D", "explanation": ""}, {"id": 348, "type": "单选题", "stem": "根据特种作业目录，以下不属于特种作业的是（）。", "options": ["电工作业", "清洗作业", "焊接与热切割作业", "高处作业"], "answer": "B", "explanation": ""}, {"id": 349, "type": "单选题", "stem": "根据特种作业目录，以下不是特种作业的是（）。", "options": ["电工作业", "垃圾分拣作业", "制冷与空调作业", "高处作业"], "answer": "B", "explanation": ""}, {"id": 350, "type": "单选题", "stem": "运营公司范围内开展危险作业前相关要求，以下不正确的是（）。", "options": ["对作业安全风险进行评估，根据安全风险制定作业方案、安全防范措施和现场应急处置措施,现场作业方案应当经班（组）长同意后方可实施。", "按规定办理危险作业审批手续，确认现场作业条件符合安全作业要求。", "委托其他单位进行危险作业的，应当在作业前与作业单位签订安全生产管理协议，确认作业单位从业资质，对委外单位危险作业进行统一协调管理。", "危险作业前应进行安全技术交底，向作业人员告知危险因素、作业安全要求和现场应急处置措施等，并经双方现场签字确认。"], "answer": "A", "explanation": "对作业安全风险进行评估，根据安全风险制定作业方案、安全防范措施和现场应急处置措施,现场作业方案应当经本单位施工技术负责人审查同意后方可实施。"}, {"id": 351, "type": "单选题", "stem": "运营公司范围内开展危险作业时的相关要求，以下不正确的是（）。", "options": ["确认作业人员的上岗资格、身体状况以及劳动防护用品的配备、使用符合安全作业要求。", "配备相应的安全设施和应急救援器材，采取安全防范措施，设置作业现场的安全区域。", "安排兼职人员现场统一指挥和监督，确保操作规程的遵守和安全措施的落实。", "涉及多工种交叉作业的应统一协调管理，采取必要可靠的隔离措施:发现直接危及人身安全紧急情况的，采取应急措施，停止作业，撤出人员。"], "answer": "C", "explanation": "安排专人现场统一指挥和监督，确保操作规程的遵守和安全措施的落实。"}, {"id": 352, "type": "单选题", "stem": "运营公司范围内开展危险作业后的相关要求，以下不正确的是（）。", "options": ["事后补办危险作业审批手续。", "清理作业垃圾，恢复作业现场，恢复相关安全设施的使用功能。", "清点作业人员、作业工具，确认现场恢复情况后，撤离现场。", "整理作业台账，做好危险作业记录。"], "answer": "A", "explanation": "作业前须按规定办理危险作业审批手续，确认现场作业条件符合安全作业要求。"}, {"id": 353, "type": "单选题", "stem": "运营公司范围内开展危险作业人员的相关要求，以下不正确的是（）。", "options": ["特种作业人员必须经专门的安全技术培训，方可上岗作业。", "特种设备作业人员应当按照国家有关规定经考核合格，取得《特种设备作业人员证》，方可从事相应的作业或者管理工作。", "其他作业人员应当接受与其所从事的作业相应的安全技术理论培训和实际操作培训，考核合格后方可参与作业。", "患有职业禁忌(如高血压、心脏病、恐高症、贫血症、癫痫症和精神疾病等)，年老体弱、过度疲劳、精神不振、饮酒后人员等，不得参与危险作业。"], "answer": "A", "explanation": "特种作业人员必须经专门的安全技术培训并考核合格,取得《中华人民共和国特种作业操作证》后，方可上岗作业。"}];
var questions = [];
var view = "home";
var practiceIdx = 0;
var practiceAnswered = false;
var examQuestions = [];
var examIdx = 0;
var examAnswers = {};
var examSubmitted = false;
var editPage = 0;
var wrongFilter = 1;

function loadData() {
  var saved = localStorage.getItem("nj_metro_quiz");
  if (saved) {
    try { questions = JSON.parse(saved); } catch(e) { questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS)); }
  } else {
    questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
  }
}
function saveData() {
  localStorage.setItem("nj_metro_quiz", JSON.stringify(questions));
}
function resetDefault() {
  questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
  saveData(); render();
}
function shuffle(arr) {
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}
  return arr;
}
function addWrongCount(idx) {
  var q = questions[idx];
  if (!q) return;
  if (q._wc === undefined) q._wc = 0;
  q._wc++;
  saveData();
}

function switchView(v) {
  view = v;
  var tabs = document.querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle("active", tabs[i].dataset.view === v);
  }
  practiceIdx = 0; practiceAnswered = false;
  examSubmitted = false; examAnswers = {}; examIdx = 0; examQuestions = [];
  render();
}

function render() {
  var app = document.getElementById("app");
  if (view === "home") renderHome(app);
  else if (view === "practice") renderPractice(app);
  else if (view === "exam") renderExamRoute(app);
  else if (view === "wrongs") renderWrongs(app);
  else if (view === "edit") renderEdit(app);
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderHome(el) {
  var sc=0,jc=0,he=0,wc=0;
  for(var i=0;i<questions.length;i++){var q=questions[i];if(q.type==="\u5355\u9009\u9898")sc++;else if(q.type==="\u5224\u65ad\u9898")jc++;if(q.explanation)he++;if((q._wc||0)>0)wc++;}
  el.innerHTML='<div class="home-card"><h2>\u5357\u4eac\u5730\u94c1\u65bd\u5de5\u8d1f\u8d23\u4eba\u8003\u8bd5\u9898\u5e93</h2>'+
    '<div class="desc">\u672c\u5de5\u5177\u5305\u542b\u5168\u90e8 <b>'+questions.length+'</b> \u9053\u9898\u76ee\uff0c\u8986\u76d6\u5b89\u5168\u751f\u4ea7\u6cd5\u5f8b\u6cd5\u89c4\u3001\u65bd\u5de5\u7ba1\u7406\u3001\u8d28\u91cf\u63a7\u5236\u7b49\u77e5\u8bc6\u70b9\u3002'+
    '\u652f\u6301\u7ec3\u4e60\u6a21\u5f0f\uff08\u9010\u9898\u4f5c\u7b54\u3001\u5373\u65f6\u53cd\u9988\uff09\u3001\u8003\u8bd5\u6a21\u5f0f\uff08\u6bcf\u6b21100\u9898\uff0c\u6700\u540e\u51fa\u5206\u5e76\u663e\u793a\u9519\u9898\u56de\u987e\uff09\u548c\u9519\u9898\u672c\uff08\u81ea\u52a8\u8bb0\u5f55\u9519\u9898\uff09\uff0c'+
    '\u4f60\u8fd8\u53ef\u4ee5\u5728\u9898\u5e93\u7ba1\u7406\u4e2d\u589e\u5220\u6539\u9898\u76ee\u3002</div>'+
    '<div class="stats"><div class="stat"><div class="num">'+questions.length+'</div><div class="label">\u603b\u9898\u6570</div></div>'+
    '<div class="stat"><div class="num">'+sc+'</div><div class="label">\u5355\u9009\u9898</div></div>'+
    '<div class="stat"><div class="num">'+jc+'</div><div class="label">\u5224\u65ad\u9898</div></div>'+
    '<div class="stat"><div class="num">'+wc+'</div><div class="label">\u9519\u9898</div></div></div>'+
    '<div class="actions"><button class="btn btn-primary" onclick="switchView(\'practice\')">\u5f00\u59cb\u7ec3\u4e60</button>'+
    '<button class="btn btn-success" onclick="switchView(\'exam\')">\u6a21\u62df\u8003\u8bd5</button>'+
    '<button class="btn btn-outline" onclick="switchView(\'wrongs\')">\u9519\u9898\u672c</button>'+
    '<button class="btn btn-outline" onclick="switchView(\'edit\')">\u7ba1\u7406\u9898\u5e93</button></div></div>';
}

function renderPractice(el) {
  if(questions.length===0){el.innerHTML='<div class="home-card"><p style="text-align:center;padding:20px;color:#999">\u9898\u5e93\u4e3a\u7a7a\uff0c\u8bf7\u5148\u6dfb\u52a0\u9898\u76ee</p></div>';return;}
  var idx=practiceIdx%questions.length;var q=questions[idx];var isAnswered=practiceAnswered;var selected=q._selected||"";
  var labels="ABCD";var optsHtml="";
  for(var i=0;i<q.options.length;i++){var label=labels[i]||String(i);var cls="option";
    if(isAnswered){cls+=" disabled";if(label===q.answer)cls+=" correct";else if(selected===label)cls+=" wrong";}
    else if(selected===label){cls+=" selected";}
    optsHtml+='<div class="'+cls+'" onclick="practiceSelect(\''+label+'\')"><span class="label">'+label+'.</span><span>'+q.options[i]+'</span></div>';}
  var fb="";
  if(isAnswered){var ok=selected===q.answer;
    fb='<div class="feedback '+(ok?"correct":"wrong")+'"><span class="ans">'+(ok?"\u56de\u7b54\u6b63\u786e\uff01":"\u56de\u7b54\u9519\u8bef")+'</span>'+
      (!ok?' \u6b63\u786e\u7b54\u6848\uff1a<b>'+q.answer+'</b>':"")+(q.explanation?'<br><br>\u89e3\u6790\uff1a'+q.explanation:'')+'</div>';}
  var navBtns=isAnswered?'<button class="btn btn-primary btn-sm" onclick="practiceNext()">\u4e0b\u4e00\u9898</button>'
    :'<button class="btn btn-primary btn-sm" onclick="practiceConfirm()"'+(selected?"":" disabled")+'>\u786e\u8ba4\u7b54\u6848</button>';
  el.innerHTML='<div class="quiz-header"><span class="mode-badge">\u7ec3\u4e60\u6a21\u5f0f</span><span class="progress">\u7b2c '+(idx+1)+' / '+questions.length+' \u9898</span></div>'+
    '<div class="question-card"><span class="question-type">'+q.type+'</span><div class="question-stem">'+q.stem+'</div><div class="options">'+optsHtml+'</div>'+fb+
    '<div class="quiz-footer"><div>'+navBtns+'</div><div><button class="btn btn-outline btn-sm" onclick="practicePrev()">\u4e0a\u4e00\u9898</button></div></div></div>';
}
function practiceSelect(l){if(practiceAnswered)return;questions[practiceIdx%questions.length]._selected=l;render();}
function practiceConfirm(){
  practiceAnswered=true;
  var idx=practiceIdx%questions.length;var q=questions[idx];var selected=q._selected||"";
  if(selected!==q.answer&&selected){addWrongCount(idx);}
  render();
}
function practiceNext(){practiceAnswered=false;practiceIdx++;render();}
function practicePrev(){if(practiceIdx>0){practiceAnswered=false;practiceIdx--;render();}}

function renderExamRoute(el){
  if(examSubmitted){renderExamResult(el);return;}
  if(examQuestions.length===0){
    // Auto-start exam: 80 single choice + 20 true/false
    var single=[];var judge=[];
    for(var i=0;i<questions.length;i++){var q=questions[i];if(q.type==="\u5355\u9009\u9898")single.push(q);else if(q.type==="\u5224\u65ad\u9898")judge.push(q);}
    shuffle(single);shuffle(judge);
    var selected=single.slice(0,80).concat(judge.slice(0,20));
    shuffle(selected);
    examQuestions=selected;examIdx=0;examAnswers={};examSubmitted=false;
    renderExamQuiz(el);return;
  }
  renderExamQuiz(el);
}
function renderExamQuiz(el){
  var q=examQuestions[examIdx];var selected=examAnswers[examIdx]||"";
  var labels="ABCD";var optsHtml="";
  for(var i=0;i<q.options.length;i++){var label=labels[i]||String(i);optsHtml+='<div class="option'+(selected===label?" selected":"")+'" onclick="examSelect(\''+label+'\')"><span class="label">'+label+'.</span><span>'+q.options[i]+'</span></div>';}
  var total=examQuestions.length;var answered=Object.keys(examAnswers).length;
  var navHtml="";for(var i=0;i<total;i++){var cls2="btn-sm";if(i===examIdx)cls2+=" current";else if(examAnswers[i]!==undefined)cls2+=" answered";navHtml+='<button class="'+cls2+'" onclick="examJump('+i+')">'+(i+1)+'</button>';}
  el.innerHTML='<div class="quiz-header"><span class="mode-badge">\u8003\u8bd5\u6a21\u5f0f</span><span class="progress">'+
    answered+'/'+total+' \u5df2\u7b54 &nbsp;|&nbsp; \u5355\u9009'+q_sc()+'\u9898 \u5224\u65ad'+q_jc()+'\u9898</span></div>'+
    '<div class="question-card"><span class="question-type">'+q.type+'</span><div class="question-stem">'+q.stem+'</div><div class="options">'+optsHtml+'</div>'+
    '<div class="quiz-footer"><div><button class="btn btn-outline btn-sm" onclick="examPrev()"'+((examIdx===0)?" disabled":"")+'>\u4e0a\u4e00\u9898</button> '+
    '<button class="btn btn-outline btn-sm" onclick="examNext()"'+((examIdx===total-1)?" disabled":"")+'>\u4e0b\u4e00\u9898</button></div>'+
    '<div><button class="btn btn-success btn-sm" onclick="examSubmit()"'+((answered<total)?" disabled":"")+'>\u4ea4\u5377</button></div></div>'+
    '<div class="exam-nav">'+navHtml+'</div></div>';
}
function q_sc(){var c=0;for(var i=0;i<examQuestions.length;i++){if(examQuestions[i].type==="\u5355\u9009\u9898")c++;}return c;}
function q_jc(){var c=0;for(var i=0;i<examQuestions.length;i++){if(examQuestions[i].type==="\u5224\u65ad\u9898")c++;}return c;}
function examSelect(l){examAnswers[examIdx]=l;render();}
function examPrev(){if(examIdx>0){examIdx--;render();}}
function examNext(){if(examIdx<examQuestions.length-1){examIdx++;render();}}
function examJump(i){examIdx=i;render();}
function examSubmit(){
  if(!confirm("\u4ea4\u5377\u540e\u65e0\u6cd5\u4fee\u6539\u7b54\u6848\uff0c\u786e\u8ba4\u4ea4\u5377\uff1f"))return;
  // Record wrong answers
  for(var i=0;i<examQuestions.length;i++){var ans=examAnswers[i]||"";if(ans!==examQuestions[i].answer){addWrongCount(q_idx(examQuestions[i]));}}
  examSubmitted=true;render();
}
function q_idx(q){
  for(var i=0;i<questions.length;i++){if(questions[i]===q)return i;}
  return -1;
}
function renderExamResult(el){
  var correct=0;var wrongs=[];
  for(var i=0;i<examQuestions.length;i++){var q=examQuestions[i];var ans=examAnswers[i]||"";if(ans===q.answer)correct++;else wrongs.push({q:q,yourAnswer:ans,idx:i});}
  var total=examQuestions.length;var score=correct;var pass=score>=60;
  var wh="";if(wrongs.length>0){
    wh='<div class="wrong-review"><h4>\u9519\u9898\u56de\u987e\uff08'+wrongs.length+'\u9898\uff09</h4>';
    for(var w=0;w<wrongs.length;w++){wh+='<div class="wrong-item"><div class="q">'+wrongs[w].q.type+'\uff1a'+wrongs[w].q.stem+'</div>'+
      '<div class="detail">\u4f60\u7684\u7b54\u6848\uff1a<span style="color:#dc2626">'+(wrongs[w].yourAnswer||"(\u672a\u4f5c\u7b54)")+'</span>'+
      ' | \u6b63\u786e\u7b54\u6848\uff1a<span class="right">'+wrongs[w].q.answer+'</span>'+(wrongs[w].q.explanation?'<br>\u89e3\u6790\uff1a'+wrongs[w].q.explanation:'')+'</div></div>';}
    wh+='</div>';
  }
  el.innerHTML='<div class="results"><h3>\u8003\u8bd5\u7ed3\u679c</h3><div class="score">'+score+'/'+total+'</div>'+
    '<div class="score-detail">'+score+' \u5206'+(pass?'':'\uff0860\u5206\u53ca\u683c\uff09')+'</div>'+
    '<div class="status '+(pass?"pass":"fail")+'">'+(pass?"\u901a\u8fc7":"\u672a\u901a\u8fc7")+'</div>'+
    '<div class="exam-result-actions"><button class="btn btn-primary" onclick="switchView(\'exam\')">\u518d\u8003\u4e00\u6b21</button>'+
    '<button class="btn btn-outline" onclick="switchView(\'practice\')">\u53bb\u7ec3\u4e60</button><button class="btn btn-outline" onclick="switchView(\'wrongs\')">\u67e5\u770b\u9519\u9898\u672c</button></div>'+wh+'</div>';
}

function renderWrongs(el){
  var wfilter=wrongFilter||1;
  var wrongs=[];
  for(var i=0;i<questions.length;i++){var q=questions[i];var wc=q._wc||0;if(wc>=wfilter){wrongs.push({q:q,idx:i,count:wc});}}
  wrongs.sort(function(a,b){return b.count-a.count;});
  var tags='<div class="wrong-filter"><span class="tag'+(wfilter===1?' active':'')+'" onclick="wrongFilter=1;render()">\u5168\u90e8\u9519\u9898</span>'+
    '<span class="tag'+(wfilter===2?' active':'')+'" onclick="wrongFilter=2;render()">\u9519\u4e86 2 \u6b21\u4ee5\u4e0a</span>'+
    '<span class="tag'+(wfilter===3?' active':'')+'" onclick="wrongFilter=3;render()">\u9519\u4e86 3 \u6b21\u4ee5\u4e0a</span></div>';
  var ih='';
  if(wrongs.length===0){ih='<div class="empty-state">'+ (wfilter>1?'\u6682\u65e0\u7b26\u5408\u6761\u4ef6\u7684\u9519\u9898':'\u9519\u9898\u672c\u4e3a\u7a7a\uff0c\u8fdb\u884c\u7ec3\u4e60\u6216\u8003\u8bd5\u540e\u9519\u9898\u4f1a\u81ea\u52a8\u8bb0\u5f55')+'</div>';}
  else{
    for(var w=0;w<wrongs.length;w++){var item=wrongs[w];var q=item.q;var stem=q.stem.length>80?q.stem.slice(0,80)+"...":q.stem;
      ih+='<div class="w-item" onclick="gotoWrong('+item.idx+')"><div class="w-top"><span class="w-type">'+q.type+'</span><span class="w-count">\u9519\u4e86 '+item.count+' \u6b21</span></div>'+
        '<div class="w-stem">'+stem+'</div><div class="w-detail">\u6b63\u786e\u7b54\u6848\uff1a<span style="color:#059669">'+q.answer+'</span>'+(q.explanation?' | '+q.explanation:'')+'</div></div>';}
  }
  el.innerHTML='<div class="wrong-card"><h3>\u9519\u9898\u672c</h3><div class="sub">\u7ec3\u4e60\u548c\u8003\u8bd5\u4e2d\u7b54\u9519\u7684\u9898\u76ee\u4f1a\u81ea\u52a8\u8bb0\u5f55\u5230\u8fd9\u91cc</div>'+
    tags+'<div style="margin-bottom:10px;font-size:13px;color:#888">\u5171 '+wrongs.length+' \u9053\u9519\u9898</div></div>'+
    '<div style="margin-top:12px">'+ih+'</div>';
}
function gotoWrong(idx){practiceIdx=idx&~0;practiceAnswered=false;switchView("practice");}

function renderEdit(el){
  var ppSel=document.getElementById("per-page");var pp=ppSel?parseInt(ppSel.value):20;if(isNaN(pp))pp=20;
  var sp=editPage||0;var start=sp*pp;var end=Math.min(start+pp,questions.length);var pg=Math.ceil(questions.length/pp)||1;
  var ih="";for(var i=start;i<end;i++){var q=questions[i];var stem=q.stem.length>70?q.stem.slice(0,70)+"...":q.stem;
    ih+='<div class="q-item" onclick="editQ('+i+')"><div class="q-preview"><span class="q-type">'+q.type+'</span> '+esc(stem)+'</div>'+
      '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delQ('+i+')">\u5220\u9664</button></div>';}
  if(questions.length===0)ih='<div class="empty-state">\u9898\u5e93\u4e3a\u7a7a\uff0c\u70b9\u51fb\u4e0a\u65b9\u6309\u94ae\u6dfb\u52a0\u9898\u76ee</div>';
  var ph="";if(pg>1){ph='<div class="questions-per-page">\u6bcf\u9879<select id="per-page" onchange="editPage=0;render()">';var pps=[10,20,50,100];for(var p=0;p<pps.length;p++){ph+='<option value="'+pps[p]+'"'+(pp===pps[p]?' selected':'')+'>'+pps[p]+'</option>';}
    ph+='</select>\u6761 <span style="margin-left:8px;font-size:13px;color:#666">\u7b2c '+(sp+1)+' / '+pg+' \u9875'+
      (sp>0?' <button class="btn btn-sm btn-outline" onclick="editPage--;render()">\u4e0a\u4e00\u9875</button>':'')+
      (sp<pg-1?' <button class="btn btn-sm btn-outline" onclick="editPage++;render()">\u4e0b\u4e00\u9875</button>':'')+'</span></div>';}
  el.innerHTML=ph+'<div class="edit-toolbar"><button class="btn btn-primary btn-sm" onclick="addQ()">\u6dfb\u52a0\u9898\u76ee</button>'+
    '<button class="btn btn-outline btn-sm" onclick="if(confirm(\'\u6062\u590d\u9ed8\u8ba4\u9898\u5e93\u5c06\u4e22\u5931\u6240\u6709\u81ea\u5b9a\u4e49\u4fee\u6539\uff0c\u786e\u8ba4\uff1f\')){resetDefault()}">\u6062\u590d\u9ed8\u8ba4\u9898\u5e93</button>'+
    '<span style="font-size:13px;color:#888;margin-left:auto">\u5171 '+questions.length+' \u9898</span></div><div class="question-list">'+ih+'</div>';
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function addQ(){showModal(null);}
function editQ(idx){showModal(idx);}
function delQ(idx){if(!confirm("\u786e\u8ba4\u5220\u9664\u8fd9\u9053\u9898\uff1f"))return;questions.splice(idx,1);saveData();render();}

var edIdx=null;
function showModal(idx){
  edIdx=idx;var q=idx!==null?questions[idx]:{type:"\u5355\u9009\u9898",stem:"",options:["","","",""],answer:"A",explanation:""};
  var to='<option value="\u5355\u9009\u9898"'+(q.type==="\u5355\u9009\u9898"?' selected':'')+'>\u5355\u9009\u9898</option>'+
    '<option value="\u5224\u65ad\u9898"'+(q.type==="\u5224\u65ad\u9898"?' selected':'')+'>\u5224\u65ad\u9898</option>';
  var labels="ABCD";var oh="";
  for(var i=0;i<4;i++){oh+='<div class="opt-row"><span class="opt-label">'+labels[i]+'.</span><input type="text" id="eo'+i+'" value="'+esc(q.options[i]||"")+'" placeholder="\u9009\u9879'+labels[i]+'"></div>';}
  var div=document.createElement("div");div.className="modal-overlay";
  div.innerHTML='<div class="modal" onclick="event.stopPropagation()"><h3>'+(idx!==null?"\u7f16\u8f91\u9898\u76ee":"\u6dfb\u52a0\u9898\u76ee")+'</h3>'+
    '<div class="form-group"><label>\u9898\u578b</label><select id="et">'+to+'</select></div>'+
    '<div class="form-group"><label>\u9898\u5e72</label><textarea id="es" rows="3">'+esc(q.stem)+'</textarea></div>'+
    '<div class="form-group"><label>\u9009\u9879\uff08\u5224\u65ad\u9898\u53ea\u9700\u586b A\u3001B \u4e24\u9879\uff09</label>'+oh+'</div>'+
    '<div class="form-group"><label>\u6b63\u786e\u7b54\u6848</label><input type="text" id="ea" value="'+esc(q.answer)+'" placeholder="\u5982 A, B"></div>'+
    '<div class="form-group"><label>\u89e3\u6790\uff08\u53ef\u9009\uff09</label><textarea id="ee" rows="2">'+esc(q.explanation)+'</textarea></div>'+
    '<div class="modal-actions"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">\u53d6\u6d88</button>'+
    '<button class="btn btn-primary" onclick="saveModal()">\u4fdd\u5b58</button></div></div>';
  div.addEventListener("click",function(){div.remove();});document.body.appendChild(div);
}
function saveModal(){
  var type=document.getElementById("et").value;var stem=document.getElementById("es").value.trim();
  var answer=document.getElementById("ea").value.trim().toUpperCase();var expl=document.getElementById("ee").value.trim();
  if(!stem){alert("\u8bf7\u8f93\u5165\u9898\u5e72");return;}if(!answer){alert("\u8bf7\u8f93\u5165\u6b63\u786e\u7b54\u6848");return;}
  var opts=[];for(var i=0;i<4;i++){var v=document.getElementById("eo"+i).value.trim();if(v)opts.push(v);}
  if(opts.length<2){alert("\u8bf7\u81f3\u5c11\u586b\u5199\u4e24\u4e2a\u9009\u9879");return;}
  var q={type:type,stem:stem,options:opts,answer:answer,explanation:expl};
  if(edIdx!==null)questions[edIdx]=q;else questions.push(q);
  saveData();var m=document.querySelector(".modal-overlay");if(m)m.remove();edIdx=null;render();
}

document.addEventListener("DOMContentLoaded",function(){
  var tabs=document.querySelectorAll(".tab");for(var i=0;i<tabs.length;i++){tabs[i].addEventListener("click",function(){switchView(this.dataset.view);});}
  loadData();render();
});
(function(){var tabs=document.querySelectorAll(".tab");if(tabs.length>0){for(var i=0;i<tabs.length;i++){tabs[i].addEventListener("click",function(){switchView(this.dataset.view);});}loadData();render();}})();

</script>
